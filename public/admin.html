<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 لوحة التحكم – الرعدي أونلاين</title>
    <meta name="theme-color" content="#C9A84C">
    <style>
        :root {
            --primary: #C9A84C;
            --primary-dark: #A68A3E;
            --primary-light: #E6C975;
            --secondary: #1A1A2E;
            --bg: #0A0A15;
            --card: #1A1A2E;
            --card-hover: #222240;
            --text: #FFFFFF;
            --muted: #A0A0B0;
            --border: #2A2A3E;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        /* ========== الشريط الجانبي ========== */
        .sidebar {
            width: 280px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 20px 15px;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .sidebar-logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-logo .icon { font-size: 32px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        .nav-section { margin-bottom: 15px; }
        .nav-section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 8px 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin-bottom: 3px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            color: var(--muted);
            font-size: 14px;
            border: none;
            background: none;
            width: 100%;
            text-align: right;
            position: relative;
        }
        .nav-item:hover { background: rgba(201,168,76,0.08); color: var(--text); }
        .nav-item.active {
            background: rgba(201,168,76,0.15);
            color: var(--primary);
            font-weight: bold;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--primary);
            border-radius: 3px;
        }
        .nav-item .icon { font-size: 20px; width: 28px; text-align: center; }
        .nav-badge {
            margin-right: auto;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
        }
        .sidebar-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); }

        /* ========== المحتوى الرئيسي ========== */
        .main-content {
            margin-right: 280px;
            flex: 1;
            padding: 30px;
            transition: var(--transition);
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .page-title { font-size: 28px; font-weight: 900; display: flex; align-items: center; gap: 12px; }
        .page-title .icon { font-size: 32px; }
        .page-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        /* ========== البطاقات الإحصائية ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: var(--primary);
            opacity: 0.05;
            border-radius: 50%;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .stat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .stat-label { color: var(--muted); font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-icon { font-size: 28px; opacity: 0.7; }
        .stat-value { font-size: 32px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
        .stat-footer { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }

        /* ========== الجداول ========== */
        .table-container {
            overflow-x: auto;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }
        .table-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .table-title { font-size: 18px; font-weight: bold; }
        .table-search input {
            padding: 10px 15px;
            border-radius: 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            width: 250px;
            font-family: inherit;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        .data-table th {
            padding: 14px 15px;
            text-align: right;
            border-bottom: 2px solid var(--border);
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(201,168,76,0.05);
            color: var(--primary);
            white-space: nowrap;
        }
        .data-table td {
            padding: 14px 15px;
            text-align: right;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
        }
        .data-table tr:hover { background: rgba(201,168,76,0.03); }
        .product-img {
            width: 45px;
            height: 45px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: #0A0A15;
        }

        /* ========== الأزرار ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: var(--secondary); }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: var(--secondary); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: var(--secondary); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
        .btn-icon { width: 35px; height: 35px; border-radius: 50%; padding: 0; display: inline-flex; align-items: center; justify-content: center; }

        /* ========== الفورم ========== */
        .form-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            display: none;
        }
        .form-card.active { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } }
        .form-card h3 { font-size: 20px; color: var(--primary); margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 13px; font-weight: bold; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(201,168,76,0.1);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

        /* ========== البادجات ========== */
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        .badge-pending { background: rgba(243,156,18,0.2); color: var(--warning); }
        .badge-confirmed { background: rgba(52,152,219,0.2); color: var(--info); }
        .badge-processing { background: rgba(155,89,182,0.2); color: #9B59B6; }
        .badge-shipped { background: rgba(46,204,113,0.2); color: var(--success); }
        .badge-delivered { background: rgba(39,174,96,0.2); color: #27AE60; }
        .badge-cancelled { background: rgba(231,76,60,0.2); color: var(--danger); }

        /* ========== الألسنة ========== */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } }

        /* ========== الرسم البياني ========== */
        .chart-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 25px;
        }
        .chart-card h3 { margin-bottom: 20px; color: var(--primary); }

        /* ========== الفوتر ========== */
        .main-footer {
            text-align: center;
            padding: 20px;
            color: var(--muted);
            font-size: 12px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        /* ========== Responsive ========== */
        @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); } }
        @media (max-width: 992px) { .sidebar { width: 240px; } .main-content { margin-right: 240px; } }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; height: auto; padding: 15px; }
            .main-content { margin-right: 0; padding: 20px; }
            body { flex-direction: column; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
            .table-search input { width: 100%; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<!-- ==================== الشريط الجانبي ==================== -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <span class="icon">🦅</span>
        الرعدي أونلاين
    </div>
    
    <div class="nav-section">
        <div class="nav-section-title">الرئيسية</div>
        <button class="nav-item active" onclick="showTab('dashboard')">
            <span class="icon">📊</span> لوحة القيادة
            <span class="nav-badge" id="newOrdersBadge" style="display:none;">0</span>
        </button>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">الإدارة</div>
        <button class="nav-item" onclick="showTab('products')"><span class="icon">📦</span> المنتجات</button>
        <button class="nav-item" onclick="showTab('orders')"><span class="icon">📋</span> الطلبات</button>
        <button class="nav-item" onclick="showTab('customers')"><span class="icon">👥</span> العملاء</button>
        <button class="nav-item" onclick="showTab('coupons')"><span class="icon">🎫</span> الكوبونات</button>
        <button class="nav-item" onclick="showTab('rfq')"><span class="icon">💰</span> طلبات التفاوض</button>
        <button class="nav-item" onclick="showTab('banners')"><span class="icon">🖼️</span> البانرات</button>
        <button class="nav-item" onclick="showTab('sounds')"><span class="icon">🔊</span> الصوتيات</button>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">التحليلات</div>
        <button class="nav-item" onclick="showTab('reports')"><span class="icon">📈</span> التقارير</button>
        <button class="nav-item" onclick="showTab('maintenance')"><span class="icon">🔧</span> الصيانة التنبؤية</button>
        <button class="nav-item" onclick="showTab('competitors')"><span class="icon">🏪</span> مراقبة المنافسين</button>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">النظام</div>
        <button class="nav-item" onclick="showTab('settings')"><span class="icon">⚙️</span> الإعدادات</button>
        <button class="nav-item" onclick="showTab('customize')"><span class="icon">🎨</span> التخصيص</button>
        <button class="nav-item" onclick="showTab('trash')"><span class="icon">🗑️</span> سلة المحذوفات</button>
        <button class="nav-item" onclick="showTab('logs')"><span class="icon">📝</span> سجل النشاطات</button>
        <button class="nav-item" onclick="showTab('backup')"><span class="icon">💾</span> النسخ الاحتياطي</button>
        <button class="nav-item" onclick="showTab('roles')"><span class="icon">🔐</span> الصلاحيات</button>
    </div>

    <div class="sidebar-footer">
        <button class="nav-item" onclick="window.location.href='/'">
            <span class="icon">🏠</span> زيارة المتجر
        </button>
        <button class="nav-item" onclick="showTab('chat')">
            <span class="icon">💬</span> الدردشة الحية
        </button>
        <button class="nav-item" onclick="logout()">
            <span class="icon">🚪</span> تسجيل خروج
        </button>
    </div>
</aside>

<!-- ==================== المحتوى الرئيسي ==================== -->
<main class="main-content" id="mainContent">
    <!-- المحتوى الديناميكي سيتم بناؤه هنا -->
</main>

<script>
// ==================== المتغيرات العامة ====================
const API = '/api';
let adminToken = localStorage.getItem('adminToken') || '';
let currentTab = 'dashboard';
let editingProductId = null;
let allProductsCache = [];

// ==================== المصادقة ====================
async function initAuth() {
    if (!adminToken) {
        const pass = prompt('🔐 أدخل كلمة مرور المدير:');
        if (pass) {
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'alradi@gmail.com', password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    location.reload();
                } else {
                    alert('❌ كلمة المرور غير صحيحة');
                    window.location.href = '/';
                }
            } catch (e) {
                alert('❌ فشل الاتصال');
                window.location.href = '/';
            }
        } else {
            window.location.href = '/';
        }
    }
}

function logout() {
    if (confirm('تسجيل خروج من لوحة التحكم؟')) {
        localStorage.removeItem('adminToken');
        window.location.href = '/';
    }
}

// ==================== التنقل ====================
function showTab(tabName) {
    currentTab = tabName;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navItem = event?.target?.closest('.nav-item');
    if (navItem) navItem.classList.add('active');
    
    const main = document.getElementById('mainContent');
    
    switch (tabName) {
        case 'dashboard': buildDashboard(); break;
        case 'products': buildProducts(); break;
        case 'orders': buildOrders(); break;
        case 'customers': buildCustomers(); break;
        case 'coupons': buildCoupons(); break;
        case 'rfq': buildRFQ(); break;
        case 'banners': buildBanners(); break;
        case 'sounds': buildSounds(); break;
        case 'reports': buildReports(); break;
        case 'trash': buildTrash(); break;
        case 'logs': buildLogs(); break;
        case 'maintenance': buildMaintenance(); break;
        case 'competitors': buildCompetitors(); break;
        case 'settings': buildSettings(); break;
        case 'customize': buildCustomize(); break;
        case 'backup': buildBackup(); break;
        case 'roles': buildRoles(); break;
        case 'chat': buildChat(); break;
    }
}

// ==================== لوحة القيادة ====================
async function buildDashboard() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <div class="page-header">
            <h1 class="page-title"><span class="icon">📊</span> لوحة القيادة</h1>
            <div class="page-actions">
                <button class="btn btn-outline btn-sm" onclick="loadDashboard()">🔄 تحديث</button>
                <button class="btn btn-primary btn-sm" onclick="showTab('products')">➕ إضافة منتج</button>
            </div>
        </div>
        <div class="stats-grid" id="statsGrid"><div class="stat-card"><div class="stat-label">جاري التحميل...</div></div></div>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 25px;">
            <div class="table-container">
                <div class="table-header"><span class="table-title">📋 آخر الطلبات</span></div>
                <table class="data-table">
                    <thead><tr><th>رقم الطلب</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th></tr></thead>
                    <tbody id="recentOrdersBody"><tr><td colspan="5">جاري التحميل...</td></tr></tbody>
                </table>
            </div>
            <div class="chart-card">
                <h3>📈 المبيعات الشهرية</h3>
                <canvas id="salesChart" width="300" height="250"></canvas>
            </div>
        </div>
        <div class="chart-card" style="margin-top:25px;">
            <h3>🔮 تنبؤات نفاد المخزون</h3>
            <div id="predictedStock"></div>
        </div>
    `;
    loadDashboard();
}

async function loadDashboard() {
    try {
        const res = await fetch(`${API}/admin/stats`, { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const data = await res.json();
        if (data.success) {
            const d = data.data;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">الأرباح الصافية</span><span class="stat-icon">💰</span></div>
                    <div class="stat-value">${(d.totalRevenue || 0).toLocaleString()} ر.س</div>
                    <div class="stat-footer">جميع المبيعات</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">مبيعات اليوم</span><span class="stat-icon">📅</span></div>
                    <div class="stat-value">${(d.todayRevenue || 0).toLocaleString()} ر.س</div>
                    <div class="stat-footer">اليوم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">الطلبات النشطة</span><span class="stat-icon">📋</span></div>
                    <div class="stat-value">${d.totalOrders || 0}</div>
                    <div class="stat-footer">${d.todayOrders || 0} طلب اليوم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">العملاء</span><span class="stat-icon">👥</span></div>
                    <div class="stat-value">${d.totalCustomers || 0}</div>
                    <div class="stat-footer">مسجل</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">المنتجات</span><span class="stat-icon">📦</span></div>
                    <div class="stat-value">${d.totalProducts || 0}</div>
                    <div class="stat-footer">${d.lowStockProducts || 0} منخفضة المخزون</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">طلبات التفاوض</span><span class="stat-icon">💰</span></div>
                    <div class="stat-value">${d.pendingRFQs || 0}</div>
                    <div class="stat-footer">معلقة</div>
                </div>
            `;
            const recentOrders = d.recentOrders || [];
            document.getElementById('recentOrdersBody').innerHTML = recentOrders.length ? recentOrders.map(o => `
                <tr>
                    <td><strong>${o.orderNumber}</strong></td>
                    <td>${o.user?.fullName || o.user || 'غير معروف'}</td>
                    <td>${(o.pricing?.total || 0).toFixed(2)} ر.س</td>
                    <td><span class="badge badge-${o.status || 'pending'}">${o.status || 'pending'}</span></td>
                    <td>${new Date(o.createdAt).toLocaleDateString('ar-SA')}</td>
                </tr>
            `).join('') : '<tr><td colspan="5">لا توجد طلبات</td></tr>';
            drawChart(recentOrders);
            
            // تنبؤات المخزون
            const predictions = d.predictedOutOfStock || [];
            document.getElementById('predictedStock').innerHTML = predictions.length ? 
                predictions.map(p => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);"><span>${p.name}</span><span style="color:var(--danger);">ينفد خلال ${p.daysUntilEmpty} يوم</span></div>`).join('') :
                '<p style="color:var(--muted);">جميع المنتجات بمخزون آمن</p>';
        }
    } catch (e) { console.error(e); }
}

function drawChart(orders) {
    const canvas = document.getElementById('salesChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!orders.length) return;
    ctx.beginPath();
    ctx.strokeStyle = '#C9A84C';
    ctx.lineWidth = 3;
    const step = canvas.width / (orders.length - 1 || 1);
    const maxVal = Math.max(...orders.map(o => o.pricing?.total || 0), 1);
    orders.forEach((o, i) => {
        const x = i * step;
        const y = canvas.height - ((o.pricing?.total || 0) / maxVal) * (canvas.height - 40) - 20;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });
    ctx.stroke();
}

function toggleProductForm() {
    const form = document.getElementById('productForm');
    if (form.classList.contains('active')) {
        form.classList.remove('active');
        editingProductId = null;
    } else {
        form.classList.add('active');
        if (!editingProductId) {
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodComparePrice').value = '';
            document.getElementById('prodStock').value = 10;
            document.getElementById('prodImage').value = '';
            document.getElementById('prodDescription').value = '';
            document.getElementById('prodTags').value = '';
            document.getElementById('prodFeatured').value = 'false';
            document.getElementById('prodWarranty').value = 365;
            document.getElementById('prodMaintenance').value = 90;
            document.getElementById('prodDiscount').value = '';
        }
    }
}

async function loadCategoriesForForm() {
    const res = await fetch(`${API}/categories`);
    const data = await res.json();
    if (data.success) {
        const select = document.getElementById('prodCategory');
        if (select) select.innerHTML = '<option value="">اختر القسم...</option>' + data.data.map(c => `<option value="${c.name}">${c.icon || '📦'} ${c.name}</option>`).join('');
    }
}

function calcDiscount() {
    const price = parseFloat(document.getElementById('prodPrice')?.value);
    const compare = parseFloat(document.getElementById('prodComparePrice')?.value);
    const el = document.getElementById('prodDiscount');
    if (el) el.value = (compare && price && compare > 0) ? Math.round((1 - price/compare)*100) + '%' : '';
}

async function saveProduct() {
    const name = document.getElementById('prodName').value.trim();
    const category = document.getElementById('prodCategory').value;
    if (!name || !category) return alert('الاسم والقسم مطلوبان');
    const body = {
        name, category,
        price: parseFloat(document.getElementById('prodPrice').value) || 0,
        comparePrice: parseFloat(document.getElementById('prodComparePrice').value) || null,
        stock: parseInt(document.getElementById('prodStock').value) || 0,
        description: document.getElementById('prodDescription').value,
        images: document.getElementById('prodImage').value ? [{url: document.getElementById('prodImage').value}] : [],
        tags: document.getElementById('prodTags').value.split(',').map(t => t.trim()).filter(Boolean),
        isFeatured: document.getElementById('prodFeatured').value === 'true',
        warrantyInfo: document.getElementById('prodWarranty').value,
        maintenanceInterval: parseInt(document.getElementById('prodMaintenance').value) || 90
    };
    const url = editingProductId ? `${API}/products/${editingProductId}` : `${API}/products`;
    const method = editingProductId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: {'Content-Type':'application/json','Authorization':`Bearer ${adminToken}`}, body: JSON.stringify(body) });
    const data = await res.json();
    if (data.success) { alert('✅ تم'); toggleProductForm(); loadProducts(); }
    else alert('❌ ' + data.error);
}

async function loadProducts() {
    const res = await fetch(`${API}/products?limit=200`);
    const data = await res.json();
    if (data.success) {
        allProductsCache = data.data;
        renderProducts(data.data);
    }
}

function renderProducts(products) {
    const tbody = document.getElementById('productsBody');
    if (!tbody) return;
    tbody.innerHTML = products.map(p => `
        <tr>
            <td><img src="${p.images?.[0]?.url || ''}" class="product-img" onerror="this.style.display='none'"></td>
            <td><strong>${p.name}</strong>${p.isFeatured ? ' ⭐' : ''}</td>
            <td>${p.price} ر.س ${p.comparePrice ? `<br><s style="color:var(--muted);">${p.comparePrice} ر.س</s>` : ''}</td>
            <td style="color:${p.stock<=5?'var(--danger)':'var(--success)'}"><strong>${p.stock}</strong></td>
            <td>${p.category || 'عام'}</td>
            <td>${'⭐'.repeat(Math.round(p.ratings?.average||0))} (${p.ratings?.count||0})</td>
            <td>
                <label class="switch">
                    <input type="checkbox" ${p.isActive ? 'checked' : ''} onchange="toggleProductActive('${p._id}', this.checked)">
                    <span class="slider"></span>
                </label>
            </td>
            <td>
                <button class="btn btn-outline btn-xs" onclick="editProduct('${p._id}')">✏️</button>
                <button class="btn btn-danger btn-xs" onclick="deleteProduct('${p._id}')">🗑️</button>
            </td>
        </tr>
    `).join('');
}

function filterProducts(query) { renderProducts(query ? allProductsCache.filter(p => p.name?.includes(query)) : allProductsCache); }

async function editProduct(id) {
    const res = await fetch(`${API}/products/${id}`);
    const data = await res.json();
    if (data.success) {
        const p = data.data;
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodCategory').value = p.category;
        document.getElementById('prodPrice').value = p.price;
        document.getElementById('prodComparePrice').value = p.comparePrice || '';
        document.getElementById('prodStock').value = p.stock;
        document.getElementById('prodImage').value = p.images?.[0]?.url || '';
        document.getElementById('prodDescription').value = p.description || '';
        document.getElementById('prodTags').value = (p.tags || []).join(', ');
        document.getElementById('prodFeatured').value = p.isFeatured ? 'true' : 'false';
        document.getElementById('prodWarranty').value = p.warrantyInfo || 365;
        document.getElementById('prodMaintenance').value = p.maintenanceInterval || 90;
        calcDiscount();
        document.getElementById('productForm').classList.add('active');
        editingProductId = p._id;
    }
}

async function deleteProduct(id) {
    if (confirm('نقل المنتج إلى سلة المحذوفات؟')) {
        await fetch(`${API}/products/${id}`, { method: 'DELETE', headers: {'Authorization':`Bearer ${adminToken}`} });
        loadProducts();
    }
}

async function toggleProductActive(id, active) {
    await fetch(`${API}/products/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json','Authorization':`Bearer ${adminToken}`}, body: JSON.stringify({isActive: active}) });
}

async function uploadBulkProducts(file) {
    if (!file) return;
    const form = new FormData();
    form.append('file', file);
    const res = await fetch(`${API}/products/bulk`, { method: 'POST', headers: {'Authorization':`Bearer ${adminToken}`}, body: form });
    const data = await res.json();
    alert(data.message);
    loadProducts();
}
