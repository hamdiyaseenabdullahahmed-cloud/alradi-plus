<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 لوحة القيادة الإدارية – الرعدي</title>
    <style>
        :root {
            --primary: #C9A84C;
            --bg: #0A0A15;
            --card: #141424;
            --border: #23233B;
            --text: #FFFFFF;
            --muted: #8E8E9F;
            --success: #2ECC71;
            --danger: #E74C3C;
            --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg); color: var(--text); display: flex; min-height: 100vh;
        }
        .sidebar {
            width: 260px; background: var(--card); border-left: 1px solid var(--border); padding: 25px 15px;
        }
        .sidebar-brand { color: var(--primary); font-size: 20px; font-weight: bold; margin-bottom: 30px; }
        .nav-item {
            display: block; width: 100%; padding: 12px 15px; background: none; border: none;
            color: var(--muted); text-align: right; font-size: 14px; cursor: pointer; border-radius: 6px;
        }
        .nav-item.active { background: rgba(201,168,76,0.15); color: var(--primary); font-weight: bold; }
        
        .content { flex: 1; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); }
        .card h3 { font-size: 14px; color: var(--muted); margin-bottom: 10px; }
        .card p { font-size: 24px; color: var(--primary); font-weight: bold; }

        .btn { padding: 10px 20px; background: var(--primary); color: var(--bg); border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: var(--danger); color: white; }

        /* تفاصيل الجداول */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: var(--radius); overflow: hidden; margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--border); }
        th { color: var(--primary); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--muted); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-left: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">⚡ لوحة الإدارة</div>
    <button class="nav-item active" onclick="showTab('dashboard')">📊 الإحصائيات</button>
    <button class="nav-item" onclick="showTab('products')">📦 إدارة المنتجات</button>
    <button class="nav-item" onclick="showTab('orders')">📋 طلبات الزبائن</button>
</aside>

<main class="content">
    <div id="dashboardSection">
        <div class="header">
            <h2>الإحصائيات الفورية لمتجرك السحابي</h2>
            <button class="btn" onclick="loadStats()">🔄 تحديث فوري</button>
        </div>
        <div class="grid">
            <div class="card"><h3>إجمالي المنتجات</h3><p id="statProducts">0</p></div>
            <div class="card"><h3>إجمالي الطلبات</h3><p id="statOrders">0</p></div>
            <div class="card"><h3>المستخدمين المسجلين</h3><p id="statUsers">0</p></div>
        </div>
    </div>

    <div id="productsSection" style="display:none;">
        <div class="header">
            <h2>📦 إدارة المعروضات والمنتجات</h2>
            <button class="btn" onclick="openAddProductModal()">➕ إضافة منتج جديد</button>
        </div>
        <div class="card" id="addForm" style="display:none; margin-bottom: 20px;">
            <h3 style="margin-bottom:15px; color:var(--primary);">إضافة منتج جديد لقاعدة البيانات</h3>
            <div class="form-group">
                <label>اسم المنتج</label>
                <input type="text" id="pName">
            </div>
            <div class="form-group">
                <label>السعر (ر.س)</label>
                <input type="number" id="pPrice">
            </div>
            <div class="form-group">
                <label>القسم</label>
                <select id="pCategory">
                    <option value="إلكترونيات">إلكترونيات</option>
                    <option value="عطور">عطور</option>
                    <option value="أزياء">أزياء</option>
                </select>
            </div>
            <div class="form-group">
                <label>رابط الصورة</label>
                <input type="text" id="pImage">
            </div>
            <button class="btn" onclick="saveProduct()">💾 حفظ المنتج</button>
        </div>
        <table>
            <thead><tr><th>المنتج</th><th>القسم</th><th>السعر</th><th>التحكم</th></tr></thead>
            <tbody id="pTable"></tbody>
        </table>
    </div>

    <div id="ordersSection" style="display:none;">
        <div class="header"><h2>📋 مراجعة وتجهيز الطلبات</h2></div>
        <table>
            <thead><tr><th>رقم الطلب</th><th>الزبون</th><th>الحالة</th></tr></thead>
            <tbody id="oTable"></tbody>
        </table>
    </div>
</main>

<script>
let adminToken = localStorage.getItem('adminToken') || '';

async function verifyAccess() {
    if (!adminToken) {
        const password = prompt('🔐 الرجاء إدخال كلمة المرور الخاصة بالإدارة للدخول:');
        if (password) {
            const r = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: 'alradi@gmail.com', password })
            });
            const d = await r.json();
            if (d.success && d.user.role === 'admin') {
                adminToken = d.token;
                localStorage.setItem('adminToken', adminToken);
                loadStats();
            } else {
                alert('فشل الدخول، كلمة المرور غير صحيحة');
                window.location.href = '/';
            }
        } else {
            window.location.href = '/';
        }
    } else {
        loadStats();
    }
}

function showTab(tab) {
    document.getElementById('dashboardSection').style.display = tab === 'dashboard' ? 'block' : 'none';
    document.getElementById('productsSection').style.display = tab === 'products' ? 'block' : 'none';
    document.getElementById('ordersSection').style.display = tab === 'orders' ? 'block' : 'none';
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    if (tab === 'products') loadProducts();
    if (tab === 'orders') loadOrders();
}

async function loadStats() {
    const r = await fetch('/api/admin/stats', { headers: { 'Authorization': `Bearer ${adminToken}` } });
    const d = await r.json();
    if (d.success) {
        document.getElementById('statProducts').textContent = d.data.totalProducts;
        document.getElementById('statOrders').textContent = d.data.totalOrders;
        document.getElementById('statUsers').textContent = d.data.totalCustomers;
    }
}

async function loadProducts() {
    const r = await fetch('/api/products?limit=100');
    const d = await r.json();
    if (d.success) {
        document.getElementById('pTable').innerHTML = d.data.map(p => `
            <tr>
                <td>${p.name}</td>
                <td>${p.category}</td>
                <td>${p.price} ر.س</td>
                <td><button class="btn btn-danger" onclick="deleteProduct('${p._id}')">حذف</button></td>
            </tr>
        `).join('');
    }
}

function openAddProductModal() {
    document.getElementById('addForm').style.display = 'block';
}

async function saveProduct() {
    const body = {
        name: document.getElementById('pName').value.trim(),
        price: Number(document.getElementById('pPrice').value),
        category: document.getElementById('pCategory').value,
        images: [{ url: document.getElementById('pImage').value }]
    };
    const r = await fetch('/api/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
        body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.success) {
        alert('تم حفظ المنتج بنجاح سحابياً!');
        document.getElementById('addForm').style.display = 'none';
        loadProducts();
    }
}

async function deleteProduct(id) {
    if (confirm('هل أنت متأكد من حذف المنتج نهائياً من قاعدة البيانات السحابية؟')) {
        await fetch(`/api/products/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${adminToken}` } });
        loadProducts();
    }
}

async function loadOrders() {
    const r = await fetch('/api/orders', { headers: { 'Authorization': `Bearer ${adminToken}` } });
    const d = await r.json();
    if (d.success) {
        document.getElementById('oTable').innerHTML = d.data.map(o => `
            <tr>
                <td>${o.orderNumber}</td>
                <td>${o.userId || 'مشتري افتراضي'}</td>
                <td>${o.status}</td>
            </tr>
        `).join('');
    }
}

document.addEventListener('DOMContentLoaded', verifyAccess);
</script>
</body>
</html>
