<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الرعدي أونلاين | المتجر العالمي الأسطوري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tajawal', sans-serif;
        }
        :root {
            --primary: #e67e22;
            --primary-dark: #d35400;
            --bg: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 100%);
            --card: white;
            --border: #e2e8f0;
            --text: #0f172a;
        }
        body.dark-mode {
            --bg: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
        }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }
        .top-bar { background: #0f172a; color: #fbbf24; text-align: center; padding: 12px; position: fixed; top: 0; width: 100%; z-index: 1000; overflow: hidden; white-space: nowrap; }
        .top-bar span { display: inline-block; animation: scrollText 25s linear infinite; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .header { margin-top: 52px; background: var(--card); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; position: sticky; top: 52px; z-index: 999; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-box { background: var(--bg); border-radius: 50px; padding: 10px 20px; display: flex; align-items: center; gap: 10px; width: 280px; border: 1px solid var(--border); }
        .search-box input { background: none; border: none; outline: none; width: 100%; color: var(--text); }
        .controls { display: flex; gap: 12px; }
        .lang-select, .currency-select { padding: 8px 15px; border-radius: 40px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; }
        .user-actions { display: flex; gap: 12px; align-items: center; }
        .icon-btn { background: var(--bg); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .icon-btn:hover { background: var(--primary); color: white; }
        .cart-icon { background: var(--primary); color: white; position: relative; }
        .cart-count { position: absolute; top: -5px; right: -5px; background: #ef4444; border-radius: 50%; width: 22px; height: 22px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
        .auth-btn { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .categories { display: flex; gap: 25px; padding: 10px 30px; background: var(--card); border-bottom: 1px solid var(--border); flex-wrap: wrap; position: sticky; top: 120px; z-index: 98; }
        .category-item { font-weight: 700; cursor: pointer; padding: 8px 0; color: #64748b; position: relative; }
        .category-item.active, .category-item:hover { color: var(--primary); }
        .category-item.active::after { content: ''; position: absolute; bottom: 0; right: 0; width: 100%; height: 3px; background: var(--primary); }
        .flash-sale-timer { background: #ef4444; color: white; padding: 12px; text-align: center; border-radius: 12px; margin: 20px 30px; font-weight: bold; display: none; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .product-card { background: var(--card); border-radius: 24px; overflow: hidden; transition: 0.4s; border: 1px solid var(--border); cursor: pointer; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .product-img { width: 100%; height: 260px; object-fit: cover; }
        .product-info { padding: 20px; }
        .product-title { font-weight: 800; font-size: 1.2rem; }
        .product-price { display: flex; align-items: baseline; gap: 12px; margin: 15px 0; flex-wrap: wrap; }
        .current-price { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .old-price { font-size: 0.85rem; color: #94a3b8; text-decoration: line-through; }
        .discount-badge { background: #10b981; color: white; padding: 3px 10px; border-radius: 30px; font-size: 0.7rem; }
        .quantity-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
        .quantity-control button { background: var(--bg); border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .quantity-control button:hover { background: var(--primary); color: white; }
        .add-to-cart-btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 12px; border-radius: 50px; font-weight: 800; cursor: pointer; }
        .cart-sidebar { position: fixed; top: 0; right: -500px; width: 480px; height: 100%; background: var(--card); z-index: 1200; transition: 0.4s; padding: 25px; overflow-y: auto; border-left: 1px solid var(--border); }
        .cart-sidebar.open { right: 0; }
        .cart-timer { background: #fef3c7; color: #d97706; padding: 10px; border-radius: 12px; text-align: center; margin-bottom: 15px; display: none; }
        .rating-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1400; display: none; align-items: center; justify-content: center; }
        .rating-card { background: var(--card); width: 450px; max-width: 95%; border-radius: 35px; padding: 35px; text-align: center; }
        .rating-stars { display: flex; justify-content: center; gap: 15px; margin: 20px 0; font-size: 2rem; color: #cbd5e1; cursor: pointer; }
        .rating-stars i.active, .rating-stars i:hover { color: #fbbf24; }
        .chat-btn { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; color: white; font-size: 1.8rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .chat-window { position: fixed; bottom: 110px; right: 30px; width: 380px; height: 520px; background: var(--card); border-radius: 30px; display: none; flex-direction: column; z-index: 1001; overflow: hidden; border: 1px solid var(--primary); }
        .chat-window.open { display: flex; }
        .chat-header { background: #1e293b; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #f8fafc; }
        .chat-message.user { background: var(--primary); color: white; margin-right: auto; border-bottom-right-radius: 5px; }
        .chat-message.admin { background: #e2e8f0; margin-left: auto; border-bottom-left-radius: 5px; }
        .chat-input { display: flex; padding: 12px; border-top: 1px solid var(--border); gap: 8px; }
        .chat-input input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 50px; background: var(--bg); color: var(--text); }
        .chat-input button { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }
        .auth-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .auth-card { background: var(--card); width: 500px; max-width: 95%; border-radius: 45px; padding: 40px; text-align: center; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid var(--border); border-radius: 50px; background: var(--bg); color: var(--text); }
        .auth-card button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: 800; margin-top: 15px; cursor: pointer; }
        .toast-notification { position: fixed; bottom: 30px; left: 30px; background: var(--card); padding: 12px 24px; border-radius: 50px; display: flex; align-items: center; gap: 12px; z-index: 1100; transform: translateX(-150%); transition: 0.3s; border-right: 4px solid var(--primary); }
        .toast-notification.show { transform: translateX(0); }
        .footer { background: #0f172a; color: #94a3b8; text-align: center; padding: 40px; margin-top: 60px; }
        @media (max-width: 768px) { .search-box { width: 100%; order: 3; } .cart-sidebar { width: 100%; right: -100%; } }
    </style>
</head>
<body>

<div class="top-bar"><span>⚡ عروض الصيف تصل إلى 70% | كود WELCOME20 خصم 20% | شحن مجاني للطلبات فوق 300 ريال ⚡</span></div>

<div class="header">
    <div class="logo" onclick="location.reload()">🦅 الرعدي <span>أونلاين</span></div>
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="ابحث عن منتج..."></div>
    <div class="controls">
        <select id="langSelect" class="lang-select"><option value="ar">🇸🇦 العربية</option><option value="en">🇬🇧 English</option></select>
        <select id="currencySelect" class="currency-select"><option value="SAR">🇸🇦 ريال</option><option value="USD">🇺🇸 دولار</option></select>
    </div>
    <div class="user-actions">
        <div class="icon-btn" id="darkModeBtn" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
        <div class="icon-btn" id="wishlistBtn" onclick="openWishlist()"><i class="fas fa-heart"></i></div>
        <div class="icon-btn cart-icon" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></div>
        <button id="adminBtn" class="auth-btn" onclick="location.href='/admin'" style="display: none;">👑 لوحة التحكم</button>
        <button id="loginBtn" class="auth-btn" onclick="openAuthModal()">دخول</button>
        <button id="logoutBtn" class="auth-btn logout-btn" onclick="logout()" style="display: none;">خروج</button>
    </div>
</div>

<div class="categories" id="categoriesList"><div class="category-item active" data-cat="all">الكل</div></div>
<div id="flashSaleTimer" class="flash-sale-timer"></div>
<div class="products-grid" id="productsList"></div>

<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header"><h3>🛍️ سلة المشتريات</h3><i class="fas fa-times" onclick="toggleCart()"></i></div>
    <div id="cartTimer" class="cart-timer"></div>
    <div id="cartItems"></div>
    <div class="coupon-input"><input type="text" id="couponCode" placeholder="رمز الخصم"><button onclick="applyCoupon()">تطبيق</button></div>
    <div id="cartTotal" class="cart-total"></div>
    <button onclick="openCheckout()" style="width:100%; margin-top:15px;">✅ إتمام الطلب</button>
</div>

<div id="ratingModal" class="rating-modal-overlay">
    <div class="rating-card"><i class="fas fa-times" onclick="closeRatingModal()" style="position: absolute; top: 20px; left: 25px; cursor: pointer;"></i>
        <h3>⭐ تقييم المنتج</h3>
        <div class="rating-stars" id="ratingStars"><i class="far fa-star" data-rate="1"></i><i class="far fa-star" data-rate="2"></i><i class="far fa-star" data-rate="3"></i><i class="far fa-star" data-rate="4"></i><i class="far fa-star" data-rate="5"></i></div>
        <textarea id="ratingReview" rows="3" placeholder="اكتب مراجعتك..." style="width:100%; padding:12px; border-radius:15px; margin:15px 0;"></textarea>
        <button onclick="submitRating()">إرسال التقييم</button>
        <button onclick="closeRatingModal()">إلغاء</button>
    </div>
</div>

<div id="wishlistModal" class="auth-modal-overlay">
    <div class="auth-card"><i class="fas fa-times" onclick="closeWishlist()" style="position: absolute; top: 20px; left: 25px; cursor: pointer;"></i><h3>❤️ قائمة أمنياتي</h3><div id="wishlistItems"></div></div>
</div>

<div class="chat-btn" onclick="toggleChat()"><i class="fas fa-comments"></i></div>
<div id="chatWindow" class="chat-window">
    <div class="chat-header"><span>💬 الدعم الفني</span><i class="fas fa-times" onclick="toggleChat()"></i></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input"><input type="text" id="chatInput" placeholder="اكتب رسالتك..."><button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div>
</div>

<div id="authModal" class="auth-modal-overlay">
    <div class="auth-card"><i class="fas fa-times" onclick="closeAuthModal()" style="position: absolute; top: 20px; left: 25px; cursor: pointer;"></i>
        <div id="loginForm"><h2>🔐 تسجيل الدخول</h2><input type="email" id="loginEmail" placeholder="البريد الإلكتروني"><input type="password" id="loginPassword" placeholder="كلمة المرور"><div id="loginError" style="color:#ef4444;"></div><button onclick="login()">دخول</button><div class="switch" onclick="showRegister()">✨ إنشاء حساب جديد</div></div>
        <div id="registerForm" style="display:none;"><h2>📝 إنشاء حساب</h2><input type="text" id="regName" placeholder="الاسم الكامل"><input type="email" id="regEmail" placeholder="البريد"><input type="password" id="regPassword" placeholder="كلمة المرور"><input type="tel" id="regPhone" placeholder="الجوال"><input type="text" id="regAddress" placeholder="العنوان"><div id="registerError" style="color:#ef4444;"></div><button onclick="register()">تسجيل</button><div class="switch" onclick="showLogin()">🔙 عودة للدخول</div></div>
    </div>
</div>

<div id="toast" class="toast-notification"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>
<div class="footer"><p>© 2026 الرعدي أونلاين - تجربة تسوق فائقة وآمنة</p></div>

<script>
    // ============================== المتغيرات العامة ==============================
    let products = [], cart = [], currentUser = null, wishlist = [], quantities = {}, activeCategory = 'all';
    let currentLang = localStorage.getItem('lang') || 'ar', currentCurrency = localStorage.getItem('currency') || 'SAR';
    let exchangeRate = 3.75, couponDiscount = 0, flashSaleEnd = Date.now() + 3600000, cartTimer = null, chatInterval = null;
    let currentRatingProduct = null, selectedRating = 0;
    
    // الأصوات
    const welcomeSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3'] });
    const addToCartSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/cart-drop-01.mp3'] });
    const orderSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/coins-2.mp3'] });
    const messageSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/notification-01.mp3'] });
    
    const translations = {
        ar: { siteName: "الرعدي أونلاين", cart: "سلة المشتريات", addToCart: "أضف للسلة", outOfStock: "غير متوفر", login: "دخول", logout: "خروج", total: "الإجمالي", flashSale: "🔥 عرض الخصم السريع ينتهي بعد" },
        en: { siteName: "Raadi Online", cart: "Shopping Cart", addToCart: "Add to Cart", outOfStock: "Out of Stock", login: "Login", logout: "Logout", total: "Total", flashSale: "🔥 Flash Sale ends in" }
    };
    
    function convertPrice(priceSAR) { return currentCurrency === 'USD' ? (priceSAR / exchangeRate).toFixed(2) : priceSAR; }
    function formatPrice(price) { return currentCurrency === 'USD' ? `$${price}` : `${price} ريال`; }
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.querySelector('#toastMsg').innerText = msg;
        toast.querySelector('i').style.color = isError ? '#ef4444' : '#10b981';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('raadi_dark', document.body.classList.contains('dark-mode')); document.getElementById('darkModeBtn').innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>'; }
    
    // ============================== المنتجات والأقسام ==============================
    async function loadProducts() {
        try {
            const res = await fetch(`/api/products?lang=${currentLang}`);
            products = await res.json();
            renderProducts();
            loadCategories();
        } catch (err) { console.error(err); showToast('خطأ في تحميل المنتجات', true); }
    }
    async function loadCategories() {
        const res = await fetch(`/api/categories?lang=${currentLang}`);
        const cats = await res.json();
        document.getElementById('categoriesList').innerHTML = '<div class="category-item active" data-cat="all">الكل</div>' + cats.map(c => `<div class="category-item" data-cat="${c.name}">${c.name}</div>`).join('');
        document.querySelectorAll('.category-item').forEach(el => el.addEventListener('click', () => { activeCategory = el.dataset.cat; renderProducts(); }));
    }
    function renderProducts() {
        let filtered = products.filter(p => activeCategory === 'all' ? true : p.category === activeCategory);
        const search = document.getElementById('searchInput').value.toLowerCase();
        if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
        const container = document.getElementById('productsList');
        if (filtered.length === 0) { container.innerHTML = '<div style="text-align:center; padding:60px;">لا توجد منتجات</div>'; return; }
        container.innerHTML = filtered.map(p => {
            const stockClass = p.stock > 10 ? 'in-stock' : (p.stock > 0 ? 'low-stock' : 'out-stock');
            const stockText = p.stock > 10 ? 'متوفر' : (p.stock > 0 ? `متبقي ${p.stock}` : 'غير متوفر');
            const inWishlist = wishlist.includes(p.id);
            return `<div class="product-card"><img src="${p.image}" class="product-img" onerror="this.src='https://picsum.photos/id/20/300/300'"><div class="product-info"><div class="product-title">${p.name}</div><div class="product-category">${p.category}</div><div><i class="fas fa-star" style="color:#fbbf24; cursor:pointer;" onclick="event.stopPropagation(); openRatingModal(${p.id})"></i> <i class="fas fa-heart" style="color:${inWishlist ? 'red' : 'gray'}; cursor:pointer;" onclick="event.stopPropagation(); toggleWishlist(${p.id})"></i></div><div class="product-price"><span class="current-price">${formatPrice(convertPrice(p.price))}</span>${p.oldPrice ? `<span class="old-price">${formatPrice(convertPrice(p.oldPrice))}</span>` : ''}${p.discount ? `<span class="discount-badge">-${p.discount}%</span>` : ''}</div><div class="stock-status"><span class="${stockClass}">${stockText}</span></div><div class="quantity-control"><button onclick="event.stopPropagation(); changeQty(${p.id}, -1)">-</button><span id="qty_${p.id}">1</span><button onclick="event.stopPropagation(); changeQty(${p.id}, 1)">+</button></div><button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCart(${p.id})">${translations[currentLang].addToCart} 🛒</button></div></div>`;
        }).join('');
    }
    function changeQty(id, delta) { const span = document.getElementById(`qty_${id}`); let newVal = Math.max(1, (quantities[id] || 1) + delta); span.innerText = newVal; quantities[id] = newVal; }
    
    // ============================== السلة والحجز ==============================
    async function addToCart(id) {
        if (!currentUser) { showToast('الرجاء تسجيل الدخول أولاً', true); openAuthModal(); return; }
        const p = products.find(p => p.id === id);
        if (!p || p.stock <= 0) { showToast(translations[currentLang].outOfStock, true); return; }
        const qty = quantities[id] || 1;
        if (qty > p.stock) { showToast(`لا يتوفر سوى ${p.stock} قطع`, true); return; }
        const exist = cart.find(i => i.id === id);
        if (exist) exist.quantity += qty;
        else cart.push({ id, name: p.name, price: p.price, quantity: qty });
        saveCart(); updateCartUI(); addToCartSound.play(); showToast('تمت الإضافة');
        startCartTimer();
    }
    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.quantity,0);
        const container = document.getElementById('cartItems');
        if (cart.length === 0) { container.innerHTML = '<div style="text-align:center; padding:30px;">السلة فارغة</div>'; document.getElementById('cartTotal').innerHTML = ''; return; }
        let sub = 0;
        container.innerHTML = cart.map(i => { sub += i.price * i.quantity; return `<div class="cart-item"><div><strong>${i.name}</strong><br>${formatPrice(convertPrice(i.price))} × ${i.quantity}</div><div><button onclick="updateCartItem(${i.id}, -1)">-</button><span>${i.quantity}</span><button onclick="updateCartItem(${i.id}, 1)">+</button><button onclick="removeFromCart(${i.id})">🗑️</button></div></div>`; }).join('');
        const disc = sub * (couponDiscount/100);
        document.getElementById('cartTotal').innerHTML = `<div>${translations[currentLang].total}: ${formatPrice(convertPrice(sub - disc))}</div>`;
    }
    function startCartTimer() {
        if (cartTimer) clearInterval(cartTimer);
        let timeLeft = 600;
        const timerDiv = document.getElementById('cartTimer');
        timerDiv.style.display = 'block';
        cartTimer = setInterval(() => {
            if (timeLeft <= 0) { clearInterval(cartTimer); timerDiv.style.display = 'none'; cart = []; saveCart(); updateCartUI(); showToast('انتهت صلاحية الحجز', true); }
            const mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
            timerDiv.innerHTML = `⏰ حجز المنتجات ${mins}:${secs < 10 ? '0' : ''}${secs}`;
            timeLeft--;
        }, 1000);
    }
    function updateCartItem(id, delta) { const item = cart.find(i => i.id === id); if (item) { const newQty = item.quantity + delta; if (newQty < 1) removeFromCart(id); else { item.quantity = newQty; saveCart(); updateCartUI(); } } }
    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); saveCart(); updateCartUI(); }
    function saveCart() { localStorage.setItem('raadi_cart', JSON.stringify(cart)); }
    function loadCart() { const saved = localStorage.getItem('raadi_cart'); if (saved) cart = JSON.parse(saved); updateCartUI(); }
    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }
    function applyCoupon() { const code = document.getElementById('couponCode').value.trim().toUpperCase(); if (code === 'WELCOME20') { couponDiscount = 20; showToast('تم تطبيق خصم 20%'); updateCartUI(); } else if (code === 'SUMMER70') { couponDiscount = 70; showToast('تم تطبيق خصم 70%'); updateCartUI(); } else showToast('كود غير صالح', true); }
    function openCheckout() { if (!currentUser) { showToast('سجل دخولك أولاً', true); openAuthModal(); return; } if (cart.length === 0) { showToast('السلة فارغة', true); return; } alert('نافذة الدفع قيد التطوير'); }
    
    // ============================== التقييمات ==============================
    function openRatingModal(id) { if (!currentUser) { showToast('سجل دخولك أولاً', true); openAuthModal(); return; } currentRatingProduct = id; selectedRating = 0; document.querySelectorAll('#ratingStars i').forEach(s => s.classList.remove('active')); document.getElementById('ratingModal').style.display = 'flex'; }
    function closeRatingModal() { document.getElementById('ratingModal').style.display = 'none'; }
    document.querySelectorAll('#ratingStars i').forEach(star => star.addEventListener('click', () => { selectedRating = parseInt(star.dataset.rate); document.querySelectorAll('#ratingStars i').forEach(s => parseInt(s.dataset.rate) <= selectedRating ? s.classList.add('active') : s.classList.remove('active')); }));
    async function submitRating() { if (selectedRating === 0) { showToast('اختر تقييماً أولاً', true); return; } await fetch(`/api/products/${currentRatingProduct}/rate`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ rating: selectedRating, review: document.getElementById('ratingReview').value }) }); showToast('شكراً لتقييمك'); closeRatingModal(); loadProducts(); }
    
    // ============================== الأمنيات ==============================
    async function toggleWishlist(id) { if (!currentUser) { showToast('سجل دخولك أولاً', true); openAuthModal(); return; } if (wishlist.includes(id)) { wishlist = wishlist.filter(i => i !== id); showToast('تمت الإزالة من الأمنيات'); } else { wishlist.push(id); showToast('تمت الإضافة للأمنيات'); } renderProducts(); }
    function openWishlist() { const container = document.getElementById('wishlistItems'); const items = products.filter(p => wishlist.includes(p.id)); container.innerHTML = items.length ? items.map(p => `<div><strong>${p.name}</strong> - ${formatPrice(convertPrice(p.price))} <button onclick="addToCart(${p.id}); closeWishlist()">أضف للسلة</button></div>`).join('') : '<div>لا توجد منتجات</div>'; document.getElementById('wishlistModal').style.display = 'flex'; }
    function closeWishlist() { document.getElementById('wishlistModal').style.display = 'none'; }
    
    // ============================== الدردشة ==============================
    async function loadMessages() { if (!currentUser) return; const res = await fetch('/api/messages'); const msgs = await res.json(); document.getElementById('chatMessages').innerHTML = msgs.map(m => `<div class="chat-message ${m.isAdmin ? 'admin' : 'user'}"><strong>${m.sender}:</strong> ${m.text_ar || m.text_en}<div style="font-size:0.7rem;">${m.timestamp}</div></div>`).join(''); }
    async function sendMessage() { const inp = document.getElementById('chatInput'); const text = inp.value.trim(); if (!text) return; await fetch('/api/messages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text_ar: text, text_en: text, isAdmin: false }) }); inp.value = ''; loadMessages(); messageSound.play(); }
    function toggleChat() { const win = document.getElementById('chatWindow'); win.classList.toggle('open'); if (win.classList.contains('open')) { if (!currentUser) { showToast('سجل دخولك أولاً', true); win.classList.remove('open'); openAuthModal(); return; } loadMessages(); if (chatInterval) clearInterval(chatInterval); chatInterval = setInterval(loadMessages, 5000); } else { if (chatInterval) clearInterval(chatInterval); } }
    
    // ============================== المصادقة ==============================
    async function login() {
        const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value;
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (data.success) { currentUser = data.user; localStorage.setItem('raadi_user', JSON.stringify(currentUser)); closeAuthModal(); updateAuthUI(); loadProducts(); showToast(`مرحباً ${currentUser.name}`); welcomeSound.play(); }
        else document.getElementById('loginError').innerText = data.error;
    }
    async function register() {
        const data = { name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPassword').value, phone: document.getElementById('regPhone').value, address: document.getElementById('regAddress').value };
        const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const result = await res.json();
        if (result.success) { showToast('تم التسجيل بنجاح، سجل الدخول الآن'); showLogin(); }
        else document.getElementById('registerError').innerText = result.error;
    }
    async function logout() { await fetch('/api/logout', { method: 'POST' }); currentUser = null; localStorage.removeItem('raadi_user'); updateAuthUI(); showToast('تم تسجيل الخروج'); loadProducts(); }
    function updateAuthUI() {
        document.getElementById('loginBtn').style.display = currentUser ? 'none' : 'block';
        document.getElementById('logoutBtn').style.display = currentUser ? 'block' : 'none';
        document.getElementById('adminBtn').style.display = (currentUser && currentUser.role === 'admin') ? 'block' : 'none';
    }
    function openAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
    function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }
    function showRegister() { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; }
    function showLogin() { document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; }
    
    // ============================== التهيئة ==============================
    document.getElementById('langSelect').addEventListener('change', (e) => { currentLang = e.target.value; localStorage.setItem('lang', currentLang); loadProducts(); });
    document.getElementById('currencySelect').addEventListener('change', (e) => { currentCurrency = e.target.value; localStorage.setItem('currency', currentCurrency); renderProducts(); updateCartUI(); });
    document.getElementById('searchInput').addEventListener('input', () => renderProducts());
    if (localStorage.getItem('raadi_dark') === 'true') toggleDarkMode();
    
    let flashInterval = setInterval(() => {
        const diff = flashSaleEnd - Date.now();
        if (diff <= 0) { document.getElementById('flashSaleTimer').style.display = 'none'; clearInterval(flashInterval); }
        else { const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000); document.getElementById('flashSaleTimer').innerHTML = `${translations[currentLang].flashSale} ${m} ${m === 1 ? 'دقيقة' : 'دقائق'} ${s} ثانية`; document.getElementById('flashSaleTimer').style.display = 'block'; }
    }, 1000);
    
    loadCart(); const savedUser = localStorage.getItem('raadi_user'); if (savedUser) { currentUser = JSON.parse(savedUser); updateAuthUI(); } loadProducts();
</script>
</body>
</html>
