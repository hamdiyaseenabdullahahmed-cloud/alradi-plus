<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرعدي أونلاين</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', system-ui;
        }
        body {
            background: linear-gradient(135deg, #1a2a3a, #0f1724);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 48px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        h1 { color: #b87333; margin-bottom: 20px; }
        button {
            background: #b87333;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            margin: 10px;
            cursor: pointer;
            width: 80%;
        }
        button:hover { background: #8b5a2b; }
        a { text-decoration: none; color: white; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ الرعدي أونلاين</h1>
        <p>متجر المستقبل - تجربة تسوق فاخرة</p>
        <button onclick="location.href='/admin'">🔐 لوحة المدير</button>
        <button onclick="location.href='/'">👤 دخول العميل</button>
        <hr style="margin: 20px 0;">
        <p style="color: #666;">API يعمل ✅ | قاعدة بيانات متصلة ✅</p>
    </div>
</body>
</html>
