<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ الرعدي أونلاين – المتجر الفاخر</title>
    <meta name="theme-color" content="#C9A84C">
    <style>
        :root {
            --primary: #C9A84C;
            --primary-dark: #A68A3E;
            --primary-light: #E6C975;
            --secondary: #0F0F1A;
            --bg-dark: #07070F;
            --bg-card: #141424;
            --border: #23233B;
            --text-light: #FFFFFF;
            --text-muted: #8E8E9F;
            --success: #2ECC71;
            --danger: #E74C3C;
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        header {
            background: rgba(11, 11, 20, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            position: sticky; top: 0; z-index: 100;
        }
        .header-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 15px;
            display: flex; align-items: center; justify-content: space-between; gap: 15px;
        }
        
        /* تصميم شعار رأس الصقر الاحترافي SVG */
        .brand {
            display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--primary);
        }
        .brand svg { width: 45px; height: 45px; fill: var(--primary); }
        .brand span { font-weight: 900; font-size: 20px; letter-spacing: 0.5px; }

        .search-bar { flex: 1; max-width: 450px; position: relative; }
        .search-bar input {
            width: 100%; padding: 12px 45px 12px 15px;
            background: var(--bg-card); border: 1.5px solid var(--border);
            border-radius: 25px; color: var(--text-light); font-size: 14px;
            transition: var(--transition);
        }
        .search-bar input:focus { border-color: var(--primary); outline: none; }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        .header-actions { display: flex; align-items: center; gap: 15px; }
        .header-btn {
            background: none; border: none; color: var(--text-light); font-size: 22px; cursor: pointer; position: relative;
        }
        .cart-badge {
            position: absolute; top: -5px; right: -8px; background: var(--danger); font-size: 10px;
            padding: 2px 6px; border-radius: 10px; font-weight: bold;
        }

        main { max-width: 1200px; margin: 25px auto; padding: 0 15px; }

        /* الأقسام والمنتجات */
        .section-title { font-size: 22px; font-weight: bold; margin: 30px 0 15px; color: var(--primary); }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; }
        .category-tab {
            flex: 0 0 auto; padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 25px; cursor: pointer; font-size: 13px; font-weight: bold; transition: var(--transition);
        }
        .category-tab.active { background: var(--primary); color: var(--bg-dark); border-color: var(--primary); }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .product-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            overflow: hidden; display: flex; flex-direction: column; transition: var(--transition);
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #000; }
        .product-body { padding: 15px; display: flex; flex-direction: column; flex: 1; }
        .product-title { font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .product-price { font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .btn-buy {
            width: 100%; padding: 10px; background: var(--primary); color: var(--bg-dark);
            font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: var(--transition);
        }
        .btn-buy:hover { background: var(--primary-light); }

        /* المودالات المنبثقة */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none;
            align-items: center; justify-content: center; z-index: 500; padding: 15px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            width: 100%; max-width: 500px; padding: 25px; position: relative;
        }
        .modal-close { position: absolute; top: 15px; left: 15px; font-size: 24px; cursor: pointer; color: var(--text-muted); }

        /* تفاصيل المنتج الاحترافية */
        .detail-img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; }
        .detail-desc { color: var(--text-muted); font-size: 14px; margin: 10px 0 20px; }

        /* السلة */
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }

        footer { text-align: center; padding: 30px; margin-top: 50px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 13px; }

        @media (max-width: 600px) {
            .brand span { display: none; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-title { font-size: 13px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="/" class="brand">
            <!-- كود الشعار المخصص: رأس الصقر الذهبي الأسطوري مع صاعقة -->
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 5 L85 45 C80 50 65 40 55 55 L90 55 L35 95 L50 60 L15 60 C30 35 35 25 50 5 Z" />
                <circle cx="50" cy="40" r="4" fill="#000" />
            </svg>
            <span>الرعدي أونلاين</span>
        </a>
        <div class="search-bar">
            <input type="text" id="search" placeholder="ابحث عن منتج متميز..." oninput="searchProducts(this.value)">
            <span class="search-icon">🔍</span>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="openCart()">🛒<span class="cart-badge" id="cartCount">0</span></button>
            <button class="header-btn" id="profileBtn" onclick="toggleAuthModal()">👤</button>
        </div>
    </div>
</header>

<main>
    <div class="section-title">📂 تصنيفات فاخرة</div>
    <div class="categories" id="cats"></div>

    <div class="section-title">✨ معروضاتنا</div>
    <div class="products-grid" id="grid"></div>
</main>

<!-- مودال تفاصيل المنتج المطور والمحسّن -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <span class="modal-close" onclick="closeModal('detailModal')">✕</span>
        <h2 id="detailTitle" style="color: var(--primary); margin-bottom:15px;"></h2>
        <img id="detailImg" class="detail-img" src="" alt="">
        <h3 id="detailPrice" style="margin-bottom:10px;"></h3>
        <p id="detailDesc" class="detail-desc"></p>
        <button class="btn-buy" id="detailAddBtn">📥 إضافة إلى سلة المشتريات</button>
    </div>
</div>

<!-- مودال السلة -->
<div class="modal-overlay" id="cartModal">
    <div class="modal">
        <span class="modal-close" onclick="closeModal('cartModal')">✕</span>
        <h2 style="color: var(--primary); margin-bottom:20px;">🛒 سلة التسوق</h2>
        <div id="cartList"></div>
        <div style="margin-top:20px; text-align:left;">
            <h3 id="cartTotal" style="margin-bottom:15px;">المجموع: 0 ر.س</h3>
            <button class="btn-buy" onclick="openCheckout()">💳 إكمال عملية الشراء</button>
        </div>
    </div>
</div>

<!-- مودال إتمام الشراء -->
<div class="modal-overlay" id="checkoutModal">
    <div class="modal">
        <span class="modal-close" onclick="closeModal('checkoutModal')">✕</span>
        <h2 style="color: var(--primary); margin-bottom:20px;">📋 تأكيد الطلب</h2>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <input type="text" id="shipAddress" placeholder="العنوان بالتفصيل" style="padding:10px; background:#000; border:1px solid var(--border); color:#fff; border-radius:5px;">
            <select id="shipType" style="padding:10px; background:#000; border:1px solid var(--border); color:#fff; border-radius:5px;">
                <option value="internal">🚚 شحن داخلي (20 ر.س)</option>
                <option value="external">✈️ شحن دولي (50 ر.س)</option>
            </select>
            <button class="btn-buy" onclick="submitOrder()">✅ إرسال الطلب الآن</button>
        </div>
    </div>
</div>

<!-- مودال تسجيل الدخول -->
<div class="modal-overlay" id="authModal">
    <div class="modal">
        <span class="modal-close" onclick="closeModal('authModal')">✕</span>
        <h2 style="color: var(--primary); margin-bottom:20px;">🔑 الحساب الشخصي</h2>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <input type="email" id="authEmail" placeholder="البريد الإلكتروني" style="padding:10px; background:#000; border:1px solid var(--border); color:#fff; border-radius:5px;">
            <input type="password" id="authPassword" placeholder="كلمة المرور" style="padding:10px; background:#000; border:1px solid var(--border); color:#fff; border-radius:5px;">
            <button class="btn-buy" onclick="login()">🚀 تسجيل دخول</button>
        </div>
    </div>
</div>

<footer>
    <p>© 2024 متجر الرعدي أونلاين. متكامل، آمن ومحمي بالكامل ⚡</p>
    <a href="/admin" style="color: var(--primary); text-decoration:none; display:inline-block; margin-top:10px;">👑 لوحة القيادة الفنية</a>
</footer>

<script>
let products = [];
let cart = [];
let currentCategory = 'all';

function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openModal(id) { document.getElementById(id).classList.add('active'); }

async function loadProducts() {
    let url = `/api/products?page=1&limit=20`;
    if (currentCategory !== 'all') url += `&category=${encodeURIComponent(currentCategory)}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.success) {
        products = d.data;
        renderProducts();
    }
}

function renderProducts() {
    const grid = document.getElementById('grid');
    grid.innerHTML = products.map(p => `
        <div class="product-card" onclick="openProductDetail('${p._id}')">
            <img class="product-img" src="${p.images?.[0]?.url || 'https://placehold.co/400'}" alt="">
            <div class="product-body">
                <div class="product-title">${p.name}</div>
                <div class="product-price">${p.price} ر.س</div>
                <button class="btn-buy" onclick="event.stopPropagation(); addToCart('${p._id}')">📥 أضف للسلة</button>
            </div>
        </div>
    `).join('');
}

async function openProductDetail(id) {
    const r = await fetch(`/api/products/${id}`);
    const d = await r.json();
    if (d.success) {
        const p = d.data;
        document.getElementById('detailTitle').textContent = p.name;
        document.getElementById('detailImg').src = p.images?.[0]?.url || 'https://placehold.co/400';
        document.getElementById('detailPrice').textContent = `${p.price} ر.س`;
        document.getElementById('detailDesc').textContent = p.description || 'لا يوجد وصف متاح حالياً.';
        document.getElementById('detailAddBtn').onclick = () => { addToCart(p._id); closeModal('detailModal'); };
        openModal('detailModal');
    }
}

async function loadCategories() {
    const r = await fetch('/api/categories');
    const d = await r.json();
    const container = document.getElementById('cats');
    container.innerHTML = `<div class="category-tab active" onclick="setCategory('all')">🏡 الكل</div>`;
    if (d.success) {
        d.data.forEach(c => {
            container.innerHTML += `<div class="category-tab" onclick="setCategory('${c.name}')">${c.icon} ${c.name}</div>`;
        });
    }
}

function setCategory(name) {
    currentCategory = name;
    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    loadProducts();
}

function addToCart(id) {
    const p = products.find(prod => prod._id === id);
    if (!p) return;
    const exist = cart.find(item => item.productId === id);
    if (exist) exist.quantity++;
    else cart.push({ productId: p._id, name: p.name, price: p.price, quantity: 1 });
    updateCartUI();
}

function updateCartUI() {
    document.getElementById('cartCount').textContent = cart.reduce((s,i)=>s+i.quantity, 0);
    const list = document.getElementById('cartList');
    list.innerHTML = cart.map((item, idx) => `
        <div class="cart-item">
            <div>
                <strong>${item.name}</strong><br>
                <small>${item.price} ر.س × ${item.quantity}</small>
            </div>
            <button onclick="removeFromCart(${idx})" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
        </div>
    `).join('');
    const total = cart.reduce((s,i)=>s+(i.price*i.quantity), 0);
    document.getElementById('cartTotal').textContent = `المجموع النهائي: ${total} ر.س`;
}

function removeFromCart(idx) {
    cart.splice(idx, 1);
    updateCartUI();
}

function openCart() { openModal('cartModal'); }
function openCheckout() { closeModal('cartModal'); openModal('checkoutModal'); }

async function submitOrder() {
    const address = document.getElementById('shipAddress').value.trim();
    if (!address) return alert('يرجى تحديد عنوان التوصيل');
    const body = {
        items: cart,
        shippingAddress: { street: address, country: 'السعودية' },
        shippingType: document.getElementById('shipType').value
    };
    const token = localStorage.getItem('token');
    const r = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.success) {
        alert('🎉 تم إرسال طلبك وحفظه سحابياً بنجاح!');
        cart = [];
        updateCartUI();
        closeModal('checkoutModal');
    } else {
        alert('⚠️ ' + d.error);
    }
}

function toggleAuthModal() {
    if (localStorage.getItem('token')) {
        alert('أنت متصل بالمتجر بالفعل');
    } else {
        openModal('authModal');
    }
}

async function login() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (d.success) {
        localStorage.setItem('token', d.token);
        alert('مرحباً بك مجدداً في الرعدي أونلاين ⚡');
        closeModal('authModal');
    } else {
        alert('⚠️ ' + d.error);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadCategories();
    loadProducts();
});
</script>
</body>
    </html>
