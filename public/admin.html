<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 لوحة التحكم – الرعدي أونلاين</title>
    <meta name="theme-color" content="#C9A84C">
    <style>
        :root {
            --primary: #C9A84C;
            --primary-dark: #A68A3E;
            --primary-light: #E6C975;
            --secondary: #1A1A2E;
            --bg: #0A0A15;
            --card: #1A1A2E;
            --card-hover: #222240;
            --text: #FFFFFF;
            --muted: #A0A0B0;
            --border: #2A2A3E;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        /* ========== الشريط الجانبي ========== */
        .sidebar {
            width: 280px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 20px 15px;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .sidebar-logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-logo .icon { font-size: 32px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        .nav-section { margin-bottom: 15px; }
        .nav-section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 8px 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin-bottom: 3px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            color: var(--muted);
            font-size: 14px;
            border: none;
            background: none;
            width: 100%;
            text-align: right;
            position: relative;
        }
        .nav-item:hover { background: rgba(201,168,76,0.08); color: var(--text); }
        .nav-item.active {
            background: rgba(201,168,76,0.15);
            color: var(--primary);
            font-weight: bold;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--primary);
            border-radius: 3px;
        }
        .nav-item .icon { font-size: 20px; width: 28px; text-align: center; }
        .nav-badge {
            margin-right: auto;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
        }
        .sidebar-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); }

        /* ========== المحتوى الرئيسي ========== */
        .main-content {
            margin-right: 280px;
            flex: 1;
            padding: 30px;
            transition: var(--transition);
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .page-title { font-size: 28px; font-weight: 900; display: flex; align-items: center; gap: 12px; }
        .page-title .icon { font-size: 32px; }
        .page-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        /* ========== البطاقات الإحصائية ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: var(--primary);
            opacity: 0.05;
            border-radius: 50%;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .stat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .stat-label { color: var(--muted); font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-icon { font-size: 28px; opacity: 0.7; }
        .stat-value { font-size: 32px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
        .stat-footer { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
        .stat-trend-up { color: var(--success); }
        .stat-trend-down { color: var(--danger); }
        .stat-warning { color: var(--warning); }

        /* ========== الجداول ========== */
        .table-container {
            overflow-x: auto;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }
        .table-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .table-title { font-size: 18px; font-weight: bold; }
        .table-search input {
            padding: 10px 15px;
            border-radius: 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            width: 250px;
            font-family: inherit;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        .data-table th {
            padding: 14px 15px;
            text-align: right;
            border-bottom: 2px solid var(--border);
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(201,168,76,0.05);
            color: var(--primary);
            white-space: nowrap;
        }
        .data-table td {
            padding: 14px 15px;
            text-align: right;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
        }
        .data-table tr:hover { background: rgba(201,168,76,0.03); }
        .product-img {
            width: 45px;
            height: 45px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: #0A0A15;
        }

        /* ========== الأزرار ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: var(--secondary); }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: var(--secondary); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: var(--secondary); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
        .btn-icon { width: 35px; height: 35px; border-radius: 50%; padding: 0; display: inline-flex; align-items: center; justify-content: center; }

        /* ========== الفورم ========== */
        .form-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            display: none;
        }
        .form-card.active { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } }
        .form-card h3 { font-size: 20px; color: var(--primary); margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 13px; font-weight: bold; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(201,168,76,0.1);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

        /* ========== البادجات ========== */
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        .badge-pending { background: rgba(243,156,18,0.2); color: var(--warning); }
        .badge-confirmed { background: rgba(52,152,219,0.2); color: var(--info); }
        .badge-processing { background: rgba(155,89,182,0.2); color: #9B59B6; }
        .badge-shipped { background: rgba(46,204,113,0.2); color: var(--success); }
        .badge-delivered { background: rgba(39,174,96,0.2); color: #27AE60; }
        .badge-cancelled { background: rgba(231,76,60,0.2); color: var(--danger); }
        .badge-returned { background: rgba(230,126,34,0.2); color: #E67E22; }

        /* ========== الألسنة ========== */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } }

        /* ========== الرسم البياني ========== */
        .chart-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 25px;
        }
        .chart-card h3 { margin-bottom: 20px; color: var(--primary); }

        /* ========== الفوتر ========== */
        .main-footer {
            text-align: center;
            padding: 20px;
            color: var(--muted);
            font-size: 12px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        /* ========== Responsive ========== */
        @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); } }
        @media (max-width: 992px) { .sidebar { width: 240px; } .main-content { margin-right: 240px; } }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; height: auto; padding: 15px; }
            .main-content { margin-right: 0; padding: 20px; }
            body { flex-direction: column; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
            .table-search input { width: 100%; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }

        /* ========== إضافات خاصة بلوحة التحكم ========== */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border);
            transition: var(--transition);
            border-radius: 26px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: var(--transition);
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background: var(--success); }
        input:checked + .toggle-slider:before { transform: translateX(22px); }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.6s ease;
        }
    </style>
</head>
<body>

<!-- ==================== الشريط الجانبي ==================== -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <span class="icon">🦅</span>
        الرعدي أونلاين
    </div>
    
    <div class="nav-section">
        <div class="nav-section-title">الرئيسية</div>
        <button class="nav-item active" onclick="showTab('dashboard')">
            <span class="icon">📊</span> لوحة القيادة
            <span class="nav-badge" id="newOrdersBadge" style="display:none;">0</span>
        </button>

    <div class="nav-section">
        <div class="nav-section-title">الإدارة</div>

        <button class="nav-item" onclick="showTab('orders')">

        </button>
        <button class="nav-item" onclick="showTab('banners')"><span class="icon">🖼️</span> البانرات</button>
        <button class="nav-item" onclick="showTab('sounds')"><span class="icon">🔊</span> الصوتيات</button>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">التحليلات</div>
        <button class="nav-item" onclick="showTab('reports')"><span class="icon">📈</span> التقارير</button>
        <button class="nav-item" onclick="showTab('maintenance')"><span class="icon">🔧</span> الصيانة التنبؤية</button>
        <button class="nav-item" onclick="showTab('competitors')"><span class="icon">🏪</span> مراقبة المنافسين</button>
        <button class="nav-item" onclick="showTab('predictions')"><span class="icon">🔮</span> تنبؤات المخزون</button>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">النظام</div>
        <button class="nav-item" onclick="showTab('settings')"><span class="icon">⚙️</span> الإعدادات</button>
        <button class="nav-item" onclick="showTab('customize')"><span class="icon">🎨</span> التخصيص</button>
        <button class="nav-item" onclick="showTab('media')"><span class="icon">📁</span> مركز الوسائط</button>
        <button class="nav-item" onclick="showTab('trash')"><span class="icon">🗑️</span> سلة المحذوفات</button>
        <button class="nav-item" onclick="showTab('logs')"><span class="icon">📝</span> سجل النشاطات</button>
        <button class="nav-item" onclick="showTab('backup')"><span class="icon">💾</span> النسخ الاحتياطي</button>
        <button class="nav-item" onclick="showTab('roles')"><span class="icon">🔐</span> الصلاحيات</button>
    </div>

    <div class="sidebar-footer">
        <button class="nav-item" onclick="window.location.href='/'">
            <span class="icon">🏠</span> زيارة المتجر
        </button>
        <button class="nav-item" onclick="showTab('chat')">
            <span class="icon">💬</span> الدردشة الحية
        </button>
        <button class="nav-item" onclick="logout()">
            <span class="icon">🚪</span> تسجيل خروج
        </button>
    </div>
</aside>

<!-- ==================== المحتوى الرئيسي ==================== -->
<main class="main-content" id="mainContent">
    <!-- المحتوى الديناميكي سيتم بناؤه هنا -->
</main>

<script>
// ==================== المتغيرات العامة ====================
const API = '/api';
let adminToken = localStorage.getItem('adminToken') || '';
let currentTab = 'dashboard';
let editingProductId = null;
let allProductsCache = [];
let allOrdersCache = [];
let allCustomersCache = [];

// ==================== المصادقة ====================
async function initAuth() {
    if (!adminToken) {
        const pass = prompt('🔐 أدخل كلمة مرور المدير:');
        if (pass) {
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'alradi@gmail.com', password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    location.reload();
                } else {
                    alert('❌ كلمة المرور غير صحيحة');
                    window.location.href = '/';
                }
            } catch (e) {
                alert('❌ فشل الاتصال');
                window.location.href = '/';
            }
        } else {
            window.location.href = '/';
        }
    }
}

function logout() {
    if (confirm('تسجيل خروج من لوحة التحكم؟')) {
        localStorage.removeItem('adminToken');
        window.location.href = '/';
    }
}

// ==================== التنقل ====================
function showTab(tabName) {
    currentTab = tabName;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navItem = event?.target?.closest('.nav-item');
    if (navItem) navItem.classList.add('active');
    
    const main = document.getElementById('mainContent');
    
    switch (tabName) {
        case 'dashboard': buildDashboard(); break;
        case 'analytics': buildAnalytics(); break;
        case 'products': buildProducts(); break;
        case 'orders': buildOrders(); break;
        case 'customers': buildCustomers(); break;
        case 'coupons': buildCoupons(); break;
        case 'rfq': buildRFQ(); break;
        case 'banners': buildBanners(); break;
        case 'sounds': buildSounds(); break;
        case 'reports': buildReports(); break;
        case 'trash': buildTrash(); break;
        case 'logs': buildLogs(); break;
        case 'maintenance': buildMaintenance(); break;
        case 'competitors': buildCompetitors(); break;
        case 'predictions': buildPredictions(); break;
        case 'settings': buildSettings(); break;
        case 'customize': buildCustomize(); break;
        case 'media': buildMedia(); break;
        case 'backup': buildBackup(); break;
        case 'roles': buildRoles(); break;
        case 'chat': buildChat(); break;
    }
}

// ==================== لوحة القيادة ====================
async function buildDashboard() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <div class="page-header">
            <h1 class="page-title"><span class="icon">📊</span> لوحة القيادة</h1>
            <div class="page-actions">
                <button class="btn btn-outline btn-sm" onclick="loadDashboard()">🔄 تحديث</button>
                <button class="btn btn-primary btn-sm" onclick="showTab('products')">➕ إضافة منتج</button>
                <button class="btn btn-outline btn-sm" onclick="exportDashboardPDF()">📄 تصدير</button>
            </div>
        </div>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-label">جاري التحميل...</div></div>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 25px;">
            <div>
                <div class="table-container">
                    <div class="table-header">
                        <span class="table-title">📋 آخر الطلبات</span>
                        <button class="btn btn-sm btn-outline" onclick="showTab('orders')">عرض الكل</button>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>رقم الطلب</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th></tr></thead>
                        <tbody id="recentOrdersBody"><tr><td colspan="5">جاري التحميل...</td></tr></tbody>
                    </table>
                </div>
                <div class="table-container" style="margin-top:25px;">
                    <div class="table-header">
                        <span class="table-title">⚠️ منتجات أوشكت على النفاد</span>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>المنتج</th><th>المخزون</th><th>معدل البيع</th><th>ينفد خلال</th></tr></thead>
                        <tbody id="lowStockBody"><tr><td colspan="4">جاري التحميل...</td></tr></tbody>
                    </table>
                </div>
            </div>
            <div>
                <div class="chart-card">
                    <h3>📈 المبيعات الشهرية</h3>
                    <canvas id="salesChart" width="350" height="250"></canvas>
                </div>
                <div class="chart-card">
                    <h3>🎯 أفضل المنتجات مبيعاً</h3>
                    <div id="bestSellingProducts"></div>
                </div>
            </div>
        </div>
    `;
    loadDashboard();
}

async function loadDashboard() {
    try {

                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">📅 مبيعات اليوم</span><span class="stat-icon">📅</span></div>
                    <div class="stat-value">${(d.todayRevenue || 0).toLocaleString()} ر.س</div>
                    <div class="stat-footer"><span class="stat-trend-up">↑</span> ${d.todayOrders || 0} طلب اليوم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">📋 إجمالي الطلبات</span><span class="stat-icon">📋</span></div>
                    <div class="stat-value">${d.totalOrders || 0}</div>
                    <div class="stat-footer">${d.todayOrders || 0} طلب جديد اليوم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">👥 العملاء</span><span class="stat-icon">👥</span></div>
                    <div class="stat-value">${d.totalCustomers || 0}</div>
                    <div class="stat-footer">مسجل في المنصة</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">📦 المنتجات</span><span class="stat-icon">📦</span></div>
                    <div class="stat-value">${d.totalProducts || 0}</div>
                    <div class="stat-footer stat-warning">⚠️ ${d.lowStockProducts || 0} منخفضة المخزون</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">📈 نسبة النمو</span><span class="stat-icon">📈</span></div>
                    <div class="stat-value">+${d.growthRate || 15}%</div>
                    <div class="stat-footer"><span class="stat-trend-up">↑</span> عن الشهر الماضي</div>
                </div>
            `;

            // آخر الطلبات
            const recentOrders = d.recentOrders || [];
            document.getElementById('recentOrdersBody').innerHTML = recentOrders.length
                ? recentOrders.map(o => `
                    <tr>
                        <td><strong>${o.orderNumber}</strong></td>
                        <td>${o.user?.fullName || o.user || 'غير معروف'}</td>
                        <td>${(o.pricing?.total || 0).toFixed(2)} ر.س</td>
                        <td><span class="badge badge-${o.status || 'pending'}">${o.status || 'pending'}</span></td>
                        <td>${new Date(o.createdAt).toLocaleDateString('ar-SA')}</td>
                    </tr>
                `).join('')
                : '<tr><td colspan="5">لا توجد طلبات</td></tr>';

            // المنتجات المنخفضة
            const lowStock = d.predictedOutOfStock || [];
            document.getElementById('lowStockBody').innerHTML = lowStock.length
                ? lowStock.map(p => `
                    <tr>
                        <td><strong>${p.name}</strong></td>
                        <td style="color:var(--danger);">${p.stock} قطعة</td>
                        <td>${p.dailyRate || 0} قطعة/يوم</td>
                        <td style="color:${p.daysUntilEmpty <= 3 ? 'var(--danger)' : 'var(--warning)'};">${p.daysUntilEmpty} يوم</td>
                    </tr>
                `).join('')
                : '<tr><td colspan="4" style="color:var(--success);">✅ جميع المنتجات بمخزون آمن</td></tr>';

            // أفضل المنتجات
            const bestSelling = d.bestSellingProducts || [];
            document.getElementById('bestSellingProducts').innerHTML = bestSelling.length
                ? bestSelling.map((p, i) => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);">
                        <span>${i + 1}. ${p.name}</span>
                        <span style="color:var(--primary); font-weight:bold;">${p.salesCount || 0} مبيعة</span>
                    </div>
                `).join('')
                : '<p style="color:var(--muted);">لا توجد بيانات</p>';

            drawChart(recentOrders);
            updateBadges(d);
        }
    } catch (e) { console.error(e); }
}

function drawChart(orders) {
    const canvas = document.getElementById('salesChart');
    if (!canvas || !orders.length) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.beginPath();
    ctx.strokeStyle = '#C9A84C';
    ctx.lineWidth = 3;
    ctx.fillStyle = 'rgba(201,168,76,0.1)';
    
    const step = canvas.width / (orders.length - 1 || 1);
    const maxVal = Math.max(...orders.map(o => o.pricing?.total || 0), 1);
    
    const points = orders.map((o, i) => ({
        x: i * step,
        y: canvas.height - ((o.pricing?.total || 0) / maxVal) * (canvas.height - 50) - 25
    }));
    
    ctx.moveTo(points[0].x, points[0].y);
    points.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(points[points.length - 1].x, canvas.height);
    ctx.lineTo(points[0].x, canvas.height);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    points.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#C9A84C';
        ctx.fill();
    });
}

function updateBadges(d) {
    if (d.todayOrders > 0) {
        document.getElementById('newOrdersBadge').textContent = d.todayOrders;
        document.getElementById('newOrdersBadge').style.display = 'inline';
    }
    if (d.lowStockProducts > 0) {
        document.getElementById('lowStockBadge').textContent = d.lowStockProducts;
        document.getElementById('lowStockBadge').style.display = 'inline';
    }
    if (d.pendingOrders > 0) {
        document.getElementById('pendingOrdersBadge').textContent = d.pendingOrders;
        document.getElementById('pendingOrdersBadge').style.display = 'inline';
    }
}

}

                <tbody id="analyticsBody"></tbody>
            </table>
        </div>
    `;
    loadAnalytics('monthly');

async function loadAnalytics(period) {
    try {
        const res = await fetch(`${API}/admin/reports?type=sales&period=${period}`, {
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await res.json();
        if (data.success && data.data.length) {
            document.getElementById('analyticsBody').innerHTML = data.data.map((r, i, arr) => {
                const prevRevenue = i > 0 ? arr[i-1].revenue : r.revenue;
                const growth = prevRevenue > 0 ? ((r.revenue - prevRevenue) / prevRevenue * 100).toFixed(1) : 0;
                return `
                    <tr>
                        <td><strong>${r._id}</strong></td>
                        <td>${r.orders}</td>
                        <td>${(r.revenue || 0).toLocaleString()} ر.س</td>
                        <td>${(r.averageOrder || 0).toFixed(2)} ر.س</td>
                        <td style="color:${growth >= 0 ? 'var(--success)' : 'var(--danger)'};">${growth >= 0 ? '+' : ''}${growth}%</td>
                    </tr>
                `;
            }).join('');

            drawAnalyticsChart(data.data);
        } else {
            document.getElementById('analyticsBody').innerHTML = '<tr><td colspan="5">لا توجد بيانات</td></tr>';
        }
    } catch (e) { console.error(e); }
}

function drawAnalyticsChart(data) {
    const canvas = document.getElementById('analyticsChart');
    if (!canvas || !data.length) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    const maxRev = Math.max(...data.map(d => d.revenue || 0), 1);
    const barWidth = (w - 120) / data.length - 10;

    data.forEach((d, i) => {
        const x = 60 + i * (barWidth + 10);
        const barH = ((d.revenue || 0) / maxRev) * (h - 100);
        const y = h - barH - 40;

        const gradient = ctx.createLinearGradient(x, y, x, h - 40);
        gradient.addColorStop(0, '#C9A84C');
        gradient.addColorStop(1, 'rgba(201,168,76,0.2)');
        ctx.fillStyle = gradient;
        ctx.fillRect(x, y, barWidth, barH);

        ctx.fillStyle = '#A0A0B0';
        ctx.font = '11px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(d._id.substring(5), x + barWidth/2, h - 10);

        ctx.fillStyle = '#C9A84C';
        ctx.fillText((d.revenue || 0).toLocaleString(), x + barWidth/2, y - 10);
    });
}

function exportAnalytics() { showToast('📄 جاري تصدير التحليلات...'); }

async function buildProducts() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `

                <button class="btn btn-outline btn-sm" onclick="document.getElementById('bulkUploadInput').click()">📁 رفع CSV</button>
                <input type="file" id="bulkUploadInput" accept=".csv" style="display:none;" onchange="uploadBulkProducts(this.files[0])">
            </div>
        </div>
        <div class="form-card" id="productForm">

            <div class="form-row">

                    <input type="text" id="prodName" placeholder="أدخل اسم المنتج">
                </div>
                <div class="form-group">
                    <label>القسم *</label>
                    <select id="prodCategory"><option value="">اختر القسم...</option></select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">

                    <input type="number" id="prodPrice" step="0.01" oninput="calcDiscount()" placeholder="0.00">

                <div class="form-group">

            </div>

            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>المخزون</label>
                    <input type="number" id="prodStock" value="10" min="0">
                </div>
                <div class="form-group">
                    <label>رابط الصورة الرئيسية</label>
                    <input type="url" id="prodImage" placeholder="https://example.com/image.jpg">
                </div>
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="prodDescription" rows="4" placeholder="اكتب وصفاً مفصلاً للمنتج..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>الوسوم (تفصل بفواصل)</label>
                    <input type="text" id="prodTags" placeholder="ساعة, ذكية, إلكترونيات">
                </div>
                <div class="form-group">
                    <label>منتج مميز؟</label>
                    <select id="prodFeatured">
                        <option value="false">لا</option>
                        <option value="true">نعم – يظهر في الصفحة الرئيسية</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>مدة الضمان (بالأيام)</label>
                    <input type="number" id="prodWarranty" value="365" min="0">
                </div>
                <div class="form-group">
                    <label>فترة تنبيه الصيانة (بالأيام)</label>
                    <input type="number" id="prodMaintenance" value="90" min="0">
                    <span class="form-hint">بعد هذه المدة من الشراء، يتلقى العميل تنبيهاً بالصيانة</span>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn btn-primary" onclick="saveProduct()">💾 حفظ المنتج</button>
                <button class="btn btn-outline" onclick="toggleProductForm()">إلغاء</button>
                ${editingProductId ? `<button class="btn btn-danger" onclick="deleteProduct('${editingProductId}')">🗑️ حذف</button>` : ''}
            </div>
        </div>
        <div class="table-container">
            <div class="table-header">
                <span class="table-title">قائمة المنتجات (${allProductsCache.length} منتج)</span>

                    <input type="text" placeholder="🔍 بحث في المنتجات..." oninput="filterProducts(this.value)">
                </div>
            </div>
            <table class="data-table">

                        <th>صورة</th>

                        <th>حالة</th>

function toggleProductForm() {
    const form = document.getElementById('productForm');
    if (form.classList.contains('active')) {
        form.classList.remove('active');
        editingProductId = null;
    } else {
        form.classList.add('active');
        if (!editingProductId) {
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodComparePrice').value = '';
            document.getElementById('prodStock').value = 10;
            document.getElementById('prodImage').value = '';
            document.getElementById('prodDescription').value = '';
            document.getElementById('prodTags').value = '';
            document.getElementById('prodFeatured').value = 'false';
            document.getElementById('prodWarranty').value = 365;
            document.getElementById('prodMaintenance').value = 90;
            document.getElementById('prodDiscount').value = '';
        }
    }
}

async function loadCategoriesForForm() {
    try {
        const res = await fetch(`${API}/categories`);
        const data = await res.json();
        if (data.success) {
            const select = document.getElementById('prodCategory');
            if (select) {
                select.innerHTML = '<option value="">اختر القسم...</option>' +
                    data.data.map(c => `<option value="${c.name}">${c.icon || '📦'} ${c.name}</option>`).join('');
            }
        }
    } catch (e) { console.error(e); }
}

function calcDiscount() {
    const price = parseFloat(document.getElementById('prodPrice')?.value);
    const compare = parseFloat(document.getElementById('prodComparePrice')?.value);
    const el = document.getElementById('prodDiscount');
    if (el) {
        el.value = (compare && price && compare > 0) 
            ? Math.round((1 - price / compare) * 100) + '%' 
            : '';
    }
}

async function saveProduct() {
    const name = document.getElementById('prodName').value.trim();
    const category = document.getElementById('prodCategory').value;
    if (!name || !category) return alert('⚠️ اسم المنتج والقسم مطلوبان');

    const body = {
        name, category,
        price: parseFloat(document.getElementById('prodPrice').value) || 0,
        comparePrice: parseFloat(document.getElementById('prodComparePrice').value) || null,
        stock: parseInt(document.getElementById('prodStock').value) || 0,
        description: document.getElementById('prodDescription').value.trim(),
        images: document.getElementById('prodImage').value 
            ? [{ url: document.getElementById('prodImage').value.trim(), type: 'main' }] 
            : [],
        tags: document.getElementById('prodTags').value.split(',').map(t => t.trim()).filter(Boolean),
        isFeatured: document.getElementById('prodFeatured').value === 'true',
        warrantyInfo: document.getElementById('prodWarranty').value,
        maintenanceInterval: parseInt(document.getElementById('prodMaintenance').value) || 90
    };

    const url = editingProductId ? `${API}/products/${editingProductId}` : `${API}/products`;
    const method = editingProductId ? 'PUT' : 'POST';

    try {
        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
            alert('✅ تم حفظ المنتج بنجاح');
            toggleProductForm();
            loadProducts();
        } else {
            alert('❌ ' + (data.error || 'فشل في حفظ المنتج'));
        }
    } catch (e) {
        alert('❌ فشل الاتصال بالخادم');
    }
}

async function loadProducts() {
    try {
        const res = await fetch(`${API}/products?limit=200`);
        const data = await res.json();
        if (data.success) {
            allProductsCache = data.data;
            renderProducts(data.data);
        }
    } catch (e) { console.error(e); }
}

function renderProducts(products) {
    const tbody = document.getElementById('productsBody');
    if (!tbody) return;

    if (!products.length) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:30px;">لا توجد منتجات</td></tr>';
        return;
    }

    tbody.innerHTML = products.map(p => `
        <tr>
            <td>
                <img src="${p.images?.[0]?.url || ''}" class="product-img" 
                     onerror="this.style.display='none'" alt="${p.name}">
            </td>
            <td>
                <strong>${p.name}</strong>
                ${p.isFeatured ? ' ⭐' : ''}
                ${p.tags?.length ? `<br><small style="color:var(--muted);">${p.tags.join(', ')}</small>` : ''}
            </td>
            <td>
                <span style="color:var(--primary); font-weight:bold;">${p.price} ر.س</span>
                ${p.comparePrice ? `<br><s style="color:var(--muted); font-size:11px;">${p.comparePrice} ر.س</s>` : ''}
                ${p.discount > 0 ? `<br><span style="color:var(--danger); font-size:11px;">-${p.discount}%</span>` : ''}
            </td>
            <td style="color:${p.stock <= 5 ? 'var(--danger)' : p.stock <= 20 ? 'var(--warning)' : 'var(--success)'}; font-weight:bold;">
                ${p.stock}
                ${p.stock <= 5 ? ' ⚠️' : ''}
            </td>
            <td>${p.category || 'عام'}</td>
            <td>${p.salesCount || 0} عملية</td>
            <td>${'⭐'.repeat(Math.round(p.ratings?.average || 0))} (${p.ratings?.count || 0})</td>
            <td>
                <label class="toggle-switch">
                    <input type="checkbox" ${p.isActive ? 'checked' : ''} onchange="toggleProductActive('${p._id}', this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </td>
            <td>
                <button class="btn btn-outline btn-xs" onclick="editProduct('${p._id}')" title="تعديل">✏️</button>
                <button class="btn btn-danger btn-xs" onclick="deleteProduct('${p._id}')" title="حذف">🗑️</button>
            </td>
        </tr>
    `).join('');

    document.getElementById('productsPagination').innerHTML = `
        <span style="color:var(--muted);">إجمالي ${products.length} منتج</span>
    `;
}

function filterProducts(query) {
    const filtered = query 
        ? allProductsCache.filter(p => 
            p.name?.toLowerCase().includes(query.toLowerCase()) ||
            p.category?.toLowerCase().includes(query.toLowerCase()) ||
            (p.tags || []).some(t => t.toLowerCase().includes(query.toLowerCase()))
          )
        : allProductsCache;
    renderProducts(filtered);
}

async function editProduct(id) {
    try {
        const res = await fetch(`${API}/products/${id}`);
        const data = await res.json();
        if (data.success) {
            const p = data.data;
            document.getElementById('prodName').value = p.name || '';
            document.getElementById('prodCategory').value = p.category || '';
            document.getElementById('prodPrice').value = p.price || '';
            document.getElementById('prodComparePrice').value = p.comparePrice || '';
            document.getElementById('prodStock').value = p.stock || 0;
            document.getElementById('prodImage').value = p.images?.[0]?.url || '';
            document.getElementById('prodDescription').value = p.description || '';
            document.getElementById('prodTags').value = (p.tags || []).join(', ');
            document.getElementById('prodFeatured').value = p.isFeatured ? 'true' : 'false';
            document.getElementById('prodWarranty').value = p.warrantyInfo || 365;
            document.getElementById('prodMaintenance').value = p.maintenanceInterval || 90;
            calcDiscount();
            document.getElementById('productForm').classList.add('active');
            editingProductId = p._id;
            document.getElementById('productForm').querySelector('h3').textContent = '📝 تعديل منتج';
        }
    } catch (e) { alert('❌ فشل جلب بيانات المنتج'); }
}

async function deleteProduct(id) {
    if (!confirm('هل أنت متأكد من نقل هذا المنتج إلى سلة المحذوفات؟')) return;
    try {
        await fetch(`${API}/products/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        loadProducts();
        showToast('🗑️ تم نقل المنتج إلى سلة المحذوفات');
    } catch (e) { alert('❌ فشل حذف المنتج'); }
}

async function toggleProductActive(id, active) {
    try {
        await fetch(`${API}/products/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
            body: JSON.stringify({ isActive: active })
        });
    } catch (e) { console.error(e); }
}

async function uploadBulkProducts(file) {
    if (!file) return;
    const form = new FormData();
    form.append('file', file);
    try {
        const res = await fetch(`${API}/products/bulk`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${adminToken}` },
            body: form
        });
        const data = await res.json();
        if (data.success) {
            alert(`✅ تم رفع ${data.count} منتج بنجاح`);
            loadProducts();
        } else {
            alert('❌ ' + (data.error || 'فشل الرفع'));
        }
    } catch (e) { alert('❌ فشل الاتصال'); }
}

async function loadOrders(filter = 'all') {
    try {
        const url = `${API}/orders${filter !== 'all' ? '?status=' + filter : ''}`;
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const data = await res.json();
        if (data.success) {
            allOrdersCache = data.data;
            renderOrders(data.data);
        }
    } catch (e) { console.error(e); }
}

    const tbody = document.getElementById('ordersBody');
    if (!tbody) return;

    if (!orders.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px;">لا توجد طلبات</td></tr>';
        return;

    tbody.innerHTML = orders.map(o => `

            <td><strong>${o.orderNumber}</strong></td>
            <td>

            <td style="color:var(--primary); font-weight:bold;">${(o.pricing?.total || 0).toFixed(2)} ر.س</td>
            <td>${o.payment?.method === 'cod' ? '💵 عند الاستلام' : o.payment?.method === 'card' ? '💳 بطاقة' : o.payment?.method === 'wallet' ? '📱 محفظة' : o.payment?.method || '—'}</td>

            <td>${new Date(o.createdAt).toLocaleDateString('ar-SA')}</td>
            <td>

function filterOrders(query) {
    const filtered = query

async function updateOrderStatus(id, status) {
    if (!status) return;
    try {
        await fetch(`${API}/orders/${id}/status`, {
            method: 'PUT',

    } catch (e) { alert('❌ فشل تحديث الحالة'); }
}

    const existing = document.querySelector('.admin-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'admin-toast';
    toast.textContent = msg;
    toast.style.cssText = `
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: var(--card); color: var(--text); padding: 15px 30px;
        border-radius: 50px; border: 1px solid var(--border); z-index: 2000;
        box-shadow: var(--shadow-lg); font-weight: bold; font-size: 14px;
        animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
        white-space: nowrap;
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function toggleCouponForm() {
    const form = document.getElementById('couponForm');
    if (form) form.classList.toggle('active');
}

async function saveCoupon() {
    const code = document.getElementById('couponCode').value.trim();
    const type = document.getElementById('couponType').value;
    const value = parseFloat(document.getElementById('couponValue').value);
    const minOrder = parseFloat(document.getElementById('couponMinOrder').value) || 0;
    const maxUses = parseInt(document.getElementById('couponMaxUses').value) || 100;
    const expiry = document.getElementById('couponExpiry').value;
    const description = document.getElementById('couponDescription').value.trim();

    if (!code || !value) return alert('⚠️ كود الكوبون وقيمة الخصم مطلوبان');

    try {
        const res = await fetch(`${API}/coupons`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
            body: JSON.stringify({
                code, discountType: type, discountValue: value,
                minOrderAmount: minOrder, maxUses, expiryDate: expiry || null, description
            })
        });
        const data = await res.json();
        if (data.success) {
            alert('✅ تم إضافة الكوبون بنجاح');
            toggleCouponForm();
            loadCoupons();
        } else {
            alert('❌ ' + (data.error || 'فشل في إضافة الكوبون'));
        }
    } catch (e) { alert('❌ فشل الاتصال'); }
}

async function loadCoupons() {
    try {
        const res = await fetch(`${API}/coupons`, {
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('couponsBody').innerHTML = data.data.length
                ? data.data.map(c => `
                    <tr>
                        <td><strong>${c.code}</strong></td>
                        <td>${c.discountType === 'percentage' ? 'نسبة مئوية' : 'قيمة ثابتة'}</td>
                        <td style="color:var(--primary); font-weight:bold;">
                            ${c.discountValue}${c.discountType === 'percentage' ? '%' : ' ر.س'}
                        </td>
                        <td>${c.minOrderAmount || 0} ر.س</td>
                        <td>${c.usedCount || 0} / ${c.maxUses || '∞'}</td>
                        <td>${c.expiryDate ? new Date(c.expiryDate).toLocaleDateString('ar-SA') : 'مفتوح'}</td>
                        <td>
                            <span style="color:${c.isActive ? 'var(--success)' : 'var(--danger)'};">
                                ${c.isActive ? '✅ نشط' : '❌ غير نشط'}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-danger btn-xs" onclick="deleteCoupon('${c.code}')">
                                ${c.isActive ? 'تعطيل' : 'حذف'}
                            </button>
                        </td>
                    </tr>
                `).join('')
                : '<tr><td colspan="8" style="text-align:center; padding:30px;">لا توجد كوبونات</td></tr>';
        }

}

async function deleteCoupon(code) {
    if (!confirm(`هل أنت متأكد من ${document.querySelector(`[onclick="deleteCoupon('${code}')"]`)?.textContent?.includes('تعطيل') ? 'تعطيل' : 'حذف'} هذا الكوبون؟`)) return;
    try {
        await fetch(`${API}/coupons/${code}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        loadCoupons();
        showToast('✅ تم بنجاح');
    } catch (e) { alert('❌ فشل'); }
}

    form.append('file', file);

    form.append('type', type);
    try {

async function loadReport() {

                html += '<th>التاريخ</th><th>الطلبات</th><th>الإيرادات</th><th>متوسط الطلب</th>';

                    html += `<td>${r._id}</td><td>${r.orders}</td><td>${(r.revenue || 0).toLocaleString()} ر.س</td><td>${(r.averageOrder || 0).toFixed(2)} ر.س</td>`;

            html += '</tbody></table>';

        } else {
            document.getElementById('reportContent').innerHTML = '<p style="color:var(--muted); text-align:center;">لا توجد بيانات</p>';

async function loadTrash() {
    try {
        const res = await fetch(`${API}/trash`, {
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('trashBody').innerHTML = data.data.length
                ? data.data.map(item => `
                    <tr>
                        <td><strong>${item.name || item._id}</strong></td>
                        <td>${item.originalCollection === 'products' ? '📦 منتج' : '📋 آخر'}</td>
                        <td>${item.deletedAt ? new Date(item.deletedAt).toLocaleString('ar-SA') : '—'}</td>
                        <td>

                                ↩️ استعادة
                            </button>
                        </td>
                        <td>
                            <button class="btn btn-danger btn-xs" onclick="permanentlyDelete('${item._id}')">
                                💀 حذف نهائي
                            </button>
                        </td>
                    </tr>
                `).join('')
                : '<tr><td colspan="5" style="text-align:center; padding:30px;">🗑️ سلة المحذوفات فارغة</td></tr>';

}

async function restoreItem(id) {
    try {
        await fetch(`${API}/trash/restore/${id}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        loadTrash();
        showToast('✅ تمت استعادة العنصر بنجاح');
    } catch (e) { alert('❌ فشلت الاستعادة'); }
}

async function permanentlyDelete(id) {
    if (!confirm('⚠️ تحذير: الحذف النهائي لا يمكن التراجع عنه!')) return;
    try {
        await fetch(`${API}/trash/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        loadTrash();
        showToast('🗑️ تم الحذف النهائي');
    } catch (e) { alert('❌ فشل الحذف'); }
}

async function emptyTrash() {
    if (!confirm('⚠️ هل أنت متأكد من تفريغ سلة المحذوفات بالكامل؟')) return;
    const items = document.querySelectorAll('#trashBody tr');
    for (const row of items) {
        const btn = row.querySelector('button');
        if (btn && btn.textContent.includes('حذف نهائي')) {
            const id = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
            if (id) await fetch(`${API}/trash/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
        }
    }
    loadTrash();
    showToast('🗑️ تم تفريغ سلة المحذوفات');
}

                    <h3>🏪 معلومات المتجر</h3>
                    <div class="form-group">
                        <label>اسم المتجر</label>
                        <input type="text" id="storeName" value="الرعدي أونلاين">
                    </div>
                    <div class="form-group">
                        <label>الشعار التسويقي</label>
                        <input type="text" id="storeSlogan" value="سوق اليمن الأول">
                    </div>
                    <div class="form-group">
                        <label>النص الإعلاني المتحرك</label>
                        <input type="text" id="marqueeText" value="🚀 شحن مجاني للطلبات فوق 500 ر.س">
                    </div>
                </div>
                <div class="chart-card">
                    <h3>📊 إعدادات الضريبة</h3>
                    <div class="form-group">
                        <label>نسبة الضريبة (%)</label>
                        <input type="number" id="taxRate" value="15" min="0" max="100">
                    </div>
                </div>
            </div>
        </div>
    `;
    loadSettings();
}

async function loadSettings() {
    try {
        const [shippingRes, returnRes, storeRes] = await Promise.all([
            fetch(`${API}/admin/settings/shipping`, { headers: { 'Authorization': `Bearer ${adminToken}` } }),
            fetch(`${API}/admin/settings/return_policy`, { headers: { 'Authorization': `Bearer ${adminToken}` } }),
            fetch(`${API}/admin/settings/store`, { headers: { 'Authorization': `Bearer ${adminToken}` } })
        ]);
        const shipping = await shippingRes.json();
        const returnPolicy = await returnRes.json();
        const store = await storeRes.json();

        if (shipping.success && shipping.data) {
            document.getElementById('internalShippingRate').value = shipping.data.internalRate || 5;
            document.getElementById('externalShippingRate').value = shipping.data.externalRate || 10;
            document.getElementById('freeShippingThreshold').value = shipping.data.freeShippingThreshold || 500;
        }
        if (returnPolicy.success && returnPolicy.data) {
            document.getElementById('returnPolicyText').value = returnPolicy.data.text || '';
            document.getElementById('returnWindow').value = returnPolicy.data.window || 14;
        }
        if (store.success && store.data) {
            document.getElementById('storeName').value = store.data.storeName || 'الرعدي أونلاين';
            document.getElementById('storeSlogan').value = store.data.storeSlogan || '';
        }
    } catch (e) { console.error(e); }
}

async function saveSettings() {
    try {
        await Promise.all([
            fetch(`${API}/admin/settings`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({
                    type: 'shipping',
                    data: {
                        internalRate: parseFloat(document.getElementById('internalShippingRate').value) || 5,
                        externalRate: parseFloat(document.getElementById('externalShippingRate').value) || 10,
                        freeShippingThreshold: parseFloat(document.getElementById('freeShippingThreshold').value) || 500
                    }
                })
            }),
            fetch(`${API}/admin/settings`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({
                    type: 'return_policy',
                    data: {
                        text: document.getElementById('returnPolicyText').value,
                        window: parseInt(document.getElementById('returnWindow').value) || 14
                    }
                })
            }),
            fetch(`${API}/admin/settings`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({
                    type: 'store',
                    data: {
                        storeName: document.getElementById('storeName').value,
                        storeSlogan: document.getElementById('storeSlogan').value
                    }
                })
            })
        ]);
        showToast('✅ تم حفظ جميع الإعدادات بنجاح');
    } catch (e) { alert('❌ فشل حفظ الإعدادات'); }
}

        <div class="chart-card">

        </div>

function applyCustomization() {
    const colors = {
        primary: document.getElementById('primaryColor').value,
        bg: document.getElementById('bgColor').value,
        text: document.getElementById('textColor').value
    };
    document.documentElement.style.setProperty('--primary', colors.primary);
    document.documentElement.style.setProperty('--bg', colors.bg);
    document.documentElement.style.setProperty('--text', colors.text);

    fetch(`${API}/admin/settings`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
        body: JSON.stringify({ type: 'theme', data: colors })
    });
    showToast('✅ تم تطبيق الألوان بنجاح');
}

async function uploadLogo() {
    const file = document.getElementById('logoFile').files[0];
    if (!file) return showToast('⚠️ اختر ملف PNG أولاً');
    const form = new FormData();
    form.append('file', file);
    form.append('type', 'logo');
    try {
        const res = await fetch(`${API}/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${adminToken}` },
            body: form
        });
        const data = await res.json();
        if (data.success) showToast('✅ تم رفع الشعار بنجاح');
    } catch (e) { alert('❌ فشل الرفع'); }
}

function testWelcomeSound() {
    const file = document.getElementById('welcomeSoundFile').files[0];
    if (file) {
        const audio = new Audio(URL.createObjectURL(file));
        audio.play();
    } else {
        showToast('⚠️ اختر ملف صوتي أولاً');
    }
}

// ==================== مركز الوسائط ====================
async function buildMedia() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <div class="page-header">
            <h1 class="page-title"><span class="icon">📁</span> مركز الوسائط</h1>
            <button class="btn btn-primary" onclick="uploadMedia()">📤 رفع ملف</button>
        </div>
        <input type="file" id="mediaFileInput" multiple accept="image/*,audio/*" style="display:none;" onchange="handleMediaUpload(this.files)">
        <div class="stats-grid" id="mediaStats"></div>
        <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:15px;" id="mediaGrid">
            <p style="color:var(--muted);">جاري تحميل الوسائط...</p>
        </div>
    `;
    loadMedia();
}

function uploadMedia() { document.getElementById('mediaFileInput').click(); }

async function handleMediaUpload(files) {
    if (!files.length) return;
    const form = new FormData();
    for (const file of files) form.append('files', file);
    form.append('type', 'general');
    try {
        const res = await fetch(`${API}/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${adminToken}` },
            body: form
        });
        const data = await res.json();
        if (data.success) {
            showToast(`✅ تم رفع ${data.data.length} ملف`);
            loadMedia();
        }
    } catch (e) { alert('❌ فشل الرفع'); }
}

async function loadMedia() {
    document.getElementById('mediaGrid').innerHTML = '<p style="color:var(--muted);">قيد التطوير</p>';
}

async function createBackup() {
    try {

        const res = await fetch(`${API}/backup`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await res.json();
        document.getElementById('backupStatus').innerHTML = data.success
            ? `<div class="chart-card" style="margin-top:20px;">
                <h3 style="color:var(--success);">✅ تم إنشاء النسخة الاحتياطية بنجاح</h3>
                <p style="color:var(--muted);">مسار النسخة: ${data.path}</p>
               </div>`
            : '<p style="color:var(--danger);">❌ فشل إنشاء النسخة الاحتياطية</p>';
    } catch (e) { alert('❌ فشل'); }
}
