<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الرعدي أونلاين | المتجر العالمي الأسطوري</title>
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/color/48/eagle.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tajawal', sans-serif;
        }
        :root {
            --primary: #e67e22;
            --primary-dark: #d35400;
            --primary-light: #f39c12;
            --secondary: #1e293b;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 100%);
            --card: white;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --radius-xl: 2rem;
            --transition: all 0.3s ease;
        }
        body.dark-mode {
            --bg: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            overflow-x: hidden;
        }
        /* شريط الإعلانات المتحرك */
        .announcement-bar {
            background: linear-gradient(90deg, var(--dark), var(--secondary));
            color: var(--primary-light);
            text-align: center;
            padding: 12px;
            font-size: 0.9rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
        }
        .announcement-bar span {
            display: inline-block;
            animation: scrollText 30s linear infinite;
            font-weight: 600;
        }
        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        /* الهيدر */
        .header {
            margin-top: 52px;
            background: var(--card);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 52px;
            z-index: 999;
            border-bottom: 2px solid var(--primary);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .logo span {
            color: var(--text);
            background: none;
        }
        .search-box {
            background: var(--bg);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 320px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
        }
        .search-box input {
            background: none;
            border: none;
            outline: none;
            width: 100%;
            color: var(--text);
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .lang-select, .currency-select {
            padding: 8px 15px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
        }
        .user-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .icon-btn {
            background: var(--bg);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.2rem;
        }
        .icon-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }
        .cart-icon {
            background: var(--primary);
            color: white;
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .auth-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .logout-btn {
            background: var(--danger);
        }
        /* شريط الأقسام المتحرك (Carousel) */
        .categories-carousel {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 120px;
            z-index: 98;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            scroll-behavior: smooth;
        }
        .categories-carousel::-webkit-scrollbar {
            height: 4px;
        }
        .categories-carousel::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 10px;
        }
        .categories-carousel::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        .category-carousel-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg);
            border: 1px solid var(--border);
        }
        .category-carousel-item.active, .category-carousel-item:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        /* السلايدر */
        .hero-slider {
            margin: 20px 30px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            position: relative;
            height: 350px;
        }
        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .slider-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
            background-size: cover;
            background-position: center;
        }
        .slider-slide.active {
            opacity: 1;
        }
        .slider-content {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            background: linear-gradient(90deg, rgba(0,0,0,0.7), transparent);
            padding: 20px;
            border-radius: var(--radius-lg);
            color: white;
        }
        .slider-dots {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }
        .slider-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .slider-dot.active {
            background: var(--primary);
            width: 25px;
            border-radius: 10px;
        }
        /* عداد العرض السريع */
        .flash-sale-timer {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            padding: 12px;
            text-align: center;
            border-radius: var(--radius-md);
            margin: 20px 30px;
            font-weight: 800;
            display: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }
        /* المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .product-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: var(--shadow-xl);
        }
        .product-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .product-card:hover .product-img {
            transform: scale(1.05);
        }
        .product-info {
            padding: 20px;
        }
        .product-title {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .product-category {
            font-size: 0.7rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .product-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }
        .stars {
            color: #fbbf24;
            font-size: 0.9rem;
        }
        .product-price {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .current-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }
        .old-price {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: line-through;
        }
        .discount-badge {
            background: var(--success);
            color: white;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .stock-status {
            font-size: 0.7rem;
            margin: 10px 0;
        }
        .in-stock {
            color: var(--success);
            background: rgba(16,185,129,0.1);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        .low-stock {
            color: var(--warning);
            background: rgba(245,158,11,0.1);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        .out-stock {
            color: var(--danger);
            background: rgba(239,68,68,0.1);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        .quantity-control button {
            background: var(--bg);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .quantity-control button:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }
        .add-to-cart-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
        }
        /* السلة الجانبية */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -500px;
            width: 480px;
            height: 100%;
            background: var(--card);
            z-index: 1200;
            transition: 0.4s;
            padding: 25px;
            overflow-y: auto;
            border-left: 1px solid var(--border);
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .cart-timer {
            background: #fef3c7;
            color: #d97706;
            padding: 10px;
            border-radius: var(--radius-md);
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }
        .cart-item-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .cart-item-actions button {
            background: var(--bg);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
        }
        .cart-item-actions button:hover {
            background: var(--primary);
            color: white;
        }
        .cart-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--primary);
            font-size: 1.2rem;
            font-weight: 800;
        }
        .coupon-input {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .coupon-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 50px;
        }
        .coupon-input button {
            background: var(--secondary);
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        /* النوافذ المنبثقة */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1300;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
        }
        .modal-card {
            background: var(--card);
            width: 550px;
            max-width: 95%;
            border-radius: 35px;
            padding: 35px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-card h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-right: 4px solid var(--primary);
            padding-right: 15px;
        }
        .modal-card input, .modal-card select, .modal-card textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .modal-card button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            margin-top: 15px;
            cursor: pointer;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 1.5rem;
            cursor: pointer;
        }
        /* الدردشة */
        .chat-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(230,126,34,0.4);
            z-index: 1000;
            color: white;
            font-size: 1.8rem;
            animation: chatPulse 2s infinite;
        }
        @keyframes chatPulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .chat-window {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 380px;
            height: 520px;
            background: var(--card);
            border-radius: 30px;
            display: none;
            flex-direction: column;
            z-index: 1001;
            overflow: hidden;
            border: 1px solid var(--primary);
        }
        .chat-window.open {
            display: flex;
        }
        .chat-header {
            background: var(--dark);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: var(--bg);
        }
        .chat-message.user {
            background: var(--primary);
            color: white;
            margin-right: auto;
            border-bottom-right-radius: 5px;
        }
        .chat-message.admin {
            background: var(--card);
            border: 1px solid var(--border);
            margin-left: auto;
            border-bottom-left-radius: 5px;
        }
        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid var(--border);
            gap: 8px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 50px;
        }
        .chat-input button {
            background: var(--primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        /* المصادقة */
        .auth-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
        }
        .auth-card {
            background: var(--card);
            width: 500px;
            max-width: 95%;
            border-radius: 45px;
            padding: 40px;
            text-align: center;
            position: relative;
        }
        .auth-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 50px;
        }
        .auth-card button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 800;
            margin-top: 15px;
            cursor: pointer;
        }
        .auth-card .switch {
            margin-top: 20px;
            color: var(--primary);
            cursor: pointer;
        }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--card);
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1100;
            transform: translateX(-150%);
            transition: 0.3s;
            border-right: 4px solid var(--primary);
        }
        .toast-notification.show {
            transform: translateX(0);
        }
        .footer {
            background: var(--dark);
            color: #94a3b8;
            text-align: center;
            padding: 40px;
            margin-top: 60px;
        }
        @media (max-width: 768px) {
            .search-box { width: 100%; order: 3; }
            .cart-sidebar { width: 100%; right: -100%; }
            .hero-slider { height: 200px; margin: 15px; }
            .products-grid { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="announcement-bar" id="announcementBar">
    <span>⚡ عروض الصيف تصل إلى 70% | كود WELCOME20 خصم 20% | شحن مجاني للطلبات فوق 300 ريال ⚡</span>
</div>

<div class="header">
    <div class="logo" onclick="location.reload()">🦅 الرعدي <span id="logoText">أونلاين</span></div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
    </div>
    <div class="controls">
        <select id="langSelect" class="lang-select">
            <option value="ar">🇸🇦 العربية</option>
            <option value="en">🇬🇧 English</option>
        </select>
        <select id="currencySelect" class="currency-select">
            <option value="SAR">🇸🇦 ريال</option>
            <option value="USD">🇺🇸 دولار</option>
        </select>
    </div>
    <div class="user-actions">
        <div class="icon-btn" id="darkModeBtn" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
        <div class="icon-btn" id="wishlistBtn" onclick="openWishlistModal()"><i class="fas fa-heart"></i></div>
        <div class="icon-btn cart-icon" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></div>
        <button id="adminBtn" class="auth-btn" onclick="location.href='/admin'" style="display: none;">👑 لوحة التحكم</button>
        <button id="loginBtn" class="auth-btn" onclick="openAuthModal()">دخول</button>
        <button id="logoutBtn" class="auth-btn logout-btn" onclick="logout()" style="display: none;">خروج</button>
    </div>
</div>

<div class="categories-carousel" id="categoriesCarousel"></div>

<div class="hero-slider" id="heroSlider">
    <div class="slider-container" id="sliderContainer"></div>
    <div class="slider-dots" id="sliderDots"></div>
</div>

<div id="flashSaleTimer" class="flash-sale-timer"></div>

<div class="products-grid" id="productsList"></div>

<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header"><h3 id="cartTitle">🛍️ سلة المشتريات</h3><i class="fas fa-times" onclick="toggleCart()"></i></div>
    <div id="cartTimer" class="cart-timer"></div>
    <div id="cartItems"></div>
    <div class="coupon-input"><input type="text" id="couponCode" placeholder="رمز الخصم"><button onclick="applyCoupon()">تطبيق</button></div>
    <div id="cartTotal" class="cart-total"></div>
    <button onclick="openCheckoutModal()">✅ إتمام الطلب</button>
</div>

<div id="checkoutModal" class="modal-overlay">
    <div class="modal-card"><i class="fas fa-times close-modal" onclick="closeCheckoutModal()"></i>
        <h3 id="checkoutTitle">📝 استكمال الطلب</h3>
        <input type="text" id="fullName" placeholder="الاسم الكامل"><input type="email" id="email" placeholder="البريد"><input type="tel" id="phone" placeholder="رقم الهاتف"><input type="text" id="address" placeholder="العنوان"><select id="country"><option value="saudi">🇸🇦 السعودية (شحن 15 ريال)</option><option value="other">🌍 خارج المملكة (شحن 50 ريال)</option></select>
        <div id="orderSummary"></div><button onclick="submitOrder()">💰 تأكيد الطلب</button>
    </div>
</div>

<div id="ratingModal" class="modal-overlay">
    <div class="modal-card"><i class="fas fa-times close-modal" onclick="closeRatingModal()"></i>
        <h3>⭐ تقييم المنتج</h3>
        <div class="rating-stars" id="ratingStars"><i class="far fa-star" data-rate="1"></i><i class="far fa-star" data-rate="2"></i><i class="far fa-star" data-rate="3"></i><i class="far fa-star" data-rate="4"></i><i class="far fa-star" data-rate="5"></i></div>
        <textarea id="ratingReview" rows="3" placeholder="اكتب مراجعتك..."></textarea>
        <button onclick="submitRating()">إرسال التقييم</button>
        <button onclick="closeRatingModal()">إلغاء</button>
    </div>
</div>

<div id="wishlistModal" class="modal-overlay">
    <div class="modal-card"><i class="fas fa-times close-modal" onclick="closeWishlistModal()"></i><h3>❤️ قائمة أمنياتي</h3><div id="wishlistItems"></div></div>
</div>

<div class="chat-btn" onclick="toggleChat()"><i class="fas fa-comments"></i></div>
<div id="chatWindow" class="chat-window">
    <div class="chat-header"><span>💬 الدعم الفني</span><i class="fas fa-times" onclick="toggleChat()"></i></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input"><input type="text" id="chatInput" placeholder="اكتب رسالتك..."><button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div>
</div>

<div id="authModal" class="auth-modal-overlay">
    <div class="auth-card"><i class="fas fa-times close-modal" onclick="closeAuthModal()"></i>
        <div id="loginForm"><h2>🔐 تسجيل الدخول</h2><input type="email" id="loginEmail" placeholder="البريد"><input type="password" id="loginPassword" placeholder="كلمة المرور"><div id="loginError" style="color:#ef4444;"></div><button onclick="login()">دخول</button><div class="switch" onclick="showRegister()">✨ إنشاء حساب</div></div>
        <div id="registerForm" style="display:none;"><h2>📝 إنشاء حساب</h2><input type="text" id="regName" placeholder="الاسم"><input type="email" id="regEmail" placeholder="البريد"><input type="password" id="regPassword" placeholder="كلمة المرور"><input type="tel" id="regPhone" placeholder="الجوال"><input type="text" id="regAddress" placeholder="العنوان"><div id="registerError" style="color:#ef4444;"></div><button onclick="register()">تسجيل</button><div class="switch" onclick="showLogin()">🔙 عودة للدخول</div></div>
    </div>
</div>

<div id="toast" class="toast-notification"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<div class="footer"><p id="footerText">© 2026 الرعدي أونلاين - تجربة تسوق فائقة وآمنة</p></div>

<script>
    // ====================================================================
    // المتغيرات العامة
    // ====================================================================
    let products = [], cart = [], currentUser = null, wishlist = [], quantities = {}, activeCategory = 'all', couponDiscount = 0;
    let currentLang = localStorage.getItem('lang') || 'ar', currentCurrency = localStorage.getItem('currency') || 'SAR';
    let exchangeRate = 3.75, shippingSettings = { domestic: 15, international: 50 };
    let flashSaleEnd = Date.now() + 3600000, flashSaleInterval = null, cartTimerInterval = null, chatInterval = null;
    let currentRatingProduct = null, selectedRating = 0;
    let banners = [], currentSlide = 0, slideInterval = null;
    
    // الأصوات
    let welcomeSound, addToCartSound, orderSound, messageSound;
    function initSounds() {
        try {
            welcomeSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3'] });
            addToCartSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/cart-drop-01.mp3'] });
            orderSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/coins-2.mp3'] });
            messageSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/notification-01.mp3'] });
        } catch(e) { console.warn('صوت غير متاح'); }
    }
    function playWelcome() { if(welcomeSound) welcomeSound.play(); }
    function playAddToCart() { if(addToCartSound) addToCartSound.play(); }
    function playOrder() { if(orderSound) orderSound.play(); }
    function playMessage() { if(messageSound) messageSound.play(); }
    
    // الترجمة والعملات
    const trans = {
        ar: { siteName:"الرعدي أونلاين", cart:"سلة المشتريات", checkout:"إتمام الطلب", addToCart:"أضف للسلة", total:"الإجمالي", discount:"الخصم", shipping:"الشحن", flashSale:"🔥 عرض الخصم السريع ينتهي بعد", minute:"دقيقة", minutes:"دقائق", second:"ثانية", seconds:"ثواني", cartReserve:"حجز المنتجات ينتهي بعد", welcome:"مرحباً بك", addedToCart:"تمت الإضافة", orderPlaced:"تم إرسال الطلب", loginRequired:"سجل دخولك أولاً", invalidCredentials:"بيانات غير صحيحة", emailExists:"البريد مسجل", registrationSuccess:"تم التسجيل", fillAllFields:"املأ الحقول", outOfStockMsg:"غير متوفر", couponApplied:"تم تطبيق خصم", invalidCoupon:"كود غير صالح", orderError:"خطأ في الطلب", serverError:"خطأ في الخادم" },
        en: { siteName:"Raadi Online", cart:"Shopping Cart", checkout:"Checkout", addToCart:"Add to Cart", total:"Total", discount:"Discount", shipping:"Shipping", flashSale:"🔥 Flash Sale ends in", minute:"minute", minutes:"minutes", second:"second", seconds:"seconds", cartReserve:"Cart reservation expires in", welcome:"Welcome", addedToCart:"Added to cart", orderPlaced:"Order placed", loginRequired:"Please login", invalidCredentials:"Invalid credentials", emailExists:"Email exists", registrationSuccess:"Registration success", fillAllFields:"Fill all fields", outOfStockMsg:"Out of stock", couponApplied:"Coupon applied", invalidCoupon:"Invalid coupon", orderError:"Order error", serverError:"Server error" }
    };
    function t(key) { return trans[currentLang][key] || key; }
    function convertPrice(p) { return currentCurrency === 'USD' ? (p / exchangeRate).toFixed(2) : p; }
    function formatPrice(p) { return currentCurrency === 'USD' ? `$${p}` : `${p} ريال`; }
    function showToast(msg, isError=false) {
        const toast = document.getElementById('toast');
        toast.querySelector('#toastMsg').innerText = msg;
        toast.querySelector('i').style.color = isError ? '#ef4444' : '#10b981';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('raadi_dark', document.body.classList.contains('dark-mode'));
        document.getElementById('darkModeBtn').innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    
    // تحميل البيانات
    async function loadProducts() {
        try {
            const res = await fetch(`/api/products?lang=${currentLang}`);
            products = await res.json();
            renderProducts();
        } catch(e) { showToast(t('serverError'), true); }
    }
    async function loadCategories() {
        try {
            const res = await fetch(`/api/categories?lang=${currentLang}`);
            const cats = await res.json();
            const container = document.getElementById('categoriesCarousel');
            container.innerHTML = cats.map(c => `<div class="category-carousel-item" data-name="${c.name}"><i class="fas ${c.icon || 'fa-tag'}"></i><span>${c.name}</span></div>`).join('');
            document.querySelectorAll('.category-carousel-item').forEach(el => {
                el.addEventListener('click', () => {
                    activeCategory = el.dataset.name;
                    document.querySelectorAll('.category-carousel-item').forEach(c => c.classList.remove('active'));
                    el.classList.add('active');
                    renderProducts();
                });
            });
        } catch(e) { console.error(e); }
    }
    async function loadBanners() {
        try {
            const res = await fetch(`/api/banners?lang=${currentLang}`);
            banners = await res.json();
            renderSlider();
        } catch(e) { console.error(e); }
    }
    async function loadAnnouncement() {
        try {
            const res = await fetch(`/api/announcements?lang=${currentLang}`);
            const data = await res.json();
            if(data.text) document.getElementById('announcementBar').innerHTML = `<span>${data.text}</span>`;
        } catch(e) { console.error(e); }
    }
    async function loadSettings() {
        try {
            const res = await fetch('/api/settings');
            const s = await res.json();
            shippingSettings.domestic = parseFloat(s.domesticShipping?.[currentLang] || 15);
            shippingSettings.international = parseFloat(s.internationalShipping?.[currentLang] || 50);
        } catch(e) { console.error(e); }
    }
    async function loadWishlist() {
        if(!currentUser) return;
        try {
            const res = await fetch('/api/wishlist');
            wishlist = await res.json();
            renderProducts();
        } catch(e) { console.error(e); }
    }
    
    // السلايدر
    function renderSlider() {
        if(!banners.length) { document.getElementById('heroSlider').style.display = 'none'; return; }
        const container = document.getElementById('sliderContainer');
        const dotsContainer = document.getElementById('sliderDots');
        container.innerHTML = banners.map((b,i) => `<div class="slider-slide ${i===0?'active':''}" style="background-image:url('${b.image}')"><div class="slider-content"><h2>${b.title}</h2><a href="${b.link}" style="color:white;background:var(--primary);padding:8px20px;border-radius:40px;display:inline-block;">تسوق الآن →</a></div></div>`).join('');
        dotsContainer.innerHTML = banners.map((_,i) => `<div class="slider-dot ${i===0?'active':''}" data-slide="${i}"></div>`).join('');
        document.querySelectorAll('.slider-dot').forEach(d => d.addEventListener('click', () => goToSlide(parseInt(d.dataset.slide))));
        startAutoSlide();
    }
    function goToSlide(i) {
        const slides = document.querySelectorAll('.slider-slide');
        const dots = document.querySelectorAll('.slider-dot');
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');
        currentSlide = i;
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');
    }
    function nextSlide() { goToSlide((currentSlide+1)%banners.length); }
    function startAutoSlide() { if(slideInterval) clearInterval(slideInterval); slideInterval = setInterval(nextSlide, 5000); }
    
    // عرض المنتجات
    function renderProducts() {
        let filtered = products.filter(p => activeCategory === 'all' || p.category === activeCategory);
        const search = document.getElementById('searchInput').value.toLowerCase();
        if(search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
        const container = document.getElementById('productsList');
        if(!filtered.length) { container.innerHTML = '<div style="text-align:center;padding:60px;">📦 لا توجد منتجات</div>'; return; }
        container.innerHTML = filtered.map(p => {
            const price = convertPrice(p.price);
            const oldPrice = p.oldPrice ? convertPrice(p.oldPrice) : null;
            const stockClass = p.stock > 10 ? 'in-stock' : (p.stock > 0 ? 'low-stock' : 'out-stock');
            const stockText = p.stock > 10 ? (currentLang==='ar'?'متوفر':'In Stock') : (p.stock>0 ? (currentLang==='ar'?`متبقي ${p.stock}`:`${p.stock} left`) : (currentLang==='ar'?'غير متوفر':'Out of Stock'));
            const inWish = wishlist.some(w => w.id === p.id);
            return `<div class="product-card"><img src="${p.image}" class="product-img" onerror="this.src='https://picsum.photos/id/20/300/300'"><div class="product-info"><div class="product-title">${p.name}</div><div class="product-category">${p.category}</div><div class="product-rating"><div class="stars">${'★'.repeat(Math.floor(p.rating||0))}${'☆'.repeat(5-Math.floor(p.rating||0))}</div><span>(${p.ratingCount||0})</span><i class="fas fa-star rate-icon" onclick="event.stopPropagation(); openRatingModal(${p.id})"></i><i class="fas fa-heart" style="color:${inWish?'#ef4444':'var(--text-muted)'};cursor:pointer;" onclick="event.stopPropagation(); toggleWishlist(${p.id})"></i></div><div class="product-price"><span class="current-price">${formatPrice(price)}</span>${oldPrice?`<span class="old-price">${formatPrice(oldPrice)}</span>`:''}${p.discount?`<span class="discount-badge">-${p.discount}%</span>`:''}</div><div class="product-features">${p.color?`🎨 ${p.color} | `:''}⚙️ ${p.features||''}</div><div class="stock-status"><span class="${stockClass}">📦 ${stockText}</span></div><div class="quantity-control"><button onclick="event.stopPropagation(); changeQty(${p.id},-1)">-</button><span id="qty_${p.id}">1</span><button onclick="event.stopPropagation(); changeQty(${p.id},1)">+</button></div><button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCart(${p.id})">🛒 ${t('addToCart')}</button></div></div>`;
        }).join('');
    }
    function changeQty(id,d) { const span = document.getElementById(`qty_${id}`); let newVal = Math.max(1, (quantities[id]||1)+d); span.innerText = newVal; quantities[id]=newVal; }
    
    // السلة
    async function addToCart(id) {
        if(!currentUser) { showToast(t('loginRequired'), true); openAuthModal(); return; }
        const p = products.find(p=>p.id===id);
        if(!p || p.stock<=0) { showToast(t('outOfStockMsg'), true); return; }
        const qty = quantities[id]||1;
        if(qty > p.stock) { showToast(`${currentLang==='ar'?`لا يتوفر سوى ${p.stock} قطع`:`Only ${p.stock} left`}`, true); return; }
        const exist = cart.find(i=>i.id===id);
        if(exist) exist.quantity += qty;
        else cart.push({ id, name:p.name, price:p.price, quantity:qty, image:p.image });
        saveCart(); updateCartUI(); playAddToCart(); showToast(t('addedToCart'));
        startCartTimer();
        await fetch('/api/reserve-stock', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ items:[{id, quantity:qty}] }) });
    }
    function updateCartUI() {
        const count = cart.reduce((s,i)=>s+i.quantity,0);
        document.getElementById('cartCount').innerText = count;
        const container = document.getElementById('cartItems');
        if(!cart.length) { container.innerHTML = '<div style="text-align:center;padding:30px;">السلة فارغة</div>'; document.getElementById('cartTotal').innerHTML=''; return; }
        let sub = 0;
        container.innerHTML = cart.map(i => { sub += i.price * i.quantity; return `<div class="cart-item"><div class="cart-item-info"><h4>${i.name}</h4><p>${formatPrice(convertPrice(i.price))} × ${i.quantity} = ${formatPrice(convertPrice(i.price*i.quantity))}</p></div><div class="cart-item-actions"><button onclick="updateCartItem(${i.id},-1)">-</button><span>${i.quantity}</span><button onclick="updateCartItem(${i.id},1)">+</button><button class="remove-btn" onclick="removeFromCart(${i.id})">🗑️</button></div></div>`; }).join('');
        const disc = sub * (couponDiscount/100);
        document.getElementById('cartTotal').innerHTML = `<div>${t('total')}: ${formatPrice(convertPrice(sub-disc))}</div>${couponDiscount>0?`<div>${t('discount')} (${couponDiscount}%): -${formatPrice(convertPrice(disc))}</div>`:''}`;
    }
    function updateCartItem(id,d) { const item = cart.find(i=>i.id===id); if(item) { const newQty = item.quantity + d; if(newQty<1) removeFromCart(id); else { item.quantity = newQty; saveCart(); updateCartUI(); } } }
    function removeFromCart(id) { cart = cart.filter(i=>i.id!==id); saveCart(); updateCartUI(); }
    function saveCart() { localStorage.setItem('raadi_cart', JSON.stringify(cart)); }
    function loadCart() { const saved = localStorage.getItem('raadi_cart'); if(saved) cart = JSON.parse(saved); updateCartUI(); }
    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }
    async function applyCoupon() {
        const code = document.getElementById('couponCode').value.trim().toUpperCase();
        try {
            const res = await fetch('/api/coupons');
            const coupons = await res.json();
            const c = coupons.find(c=>c.code===code);
            if(c) { couponDiscount = c.value; showToast(`${t('couponApplied')} ${c.value}%`); updateCartUI(); }
            else showToast(t('invalidCoupon'), true);
        } catch(e) { showToast(t('serverError'), true); }
    }
    function startCartTimer() {
        if(cartTimerInterval) clearInterval(cartTimerInterval);
        let timeLeft = 600;
        const timerDiv = document.getElementById('cartTimer');
        timerDiv.style.display = 'block';
        cartTimerInterval = setInterval(() => {
            if(timeLeft <= 0) { clearInterval(cartTimerInterval); timerDiv.style.display = 'none'; cart = []; saveCart(); updateCartUI(); showToast('انتهت صلاحية الحجز', true); }
            const mins = Math.floor(timeLeft/60), secs = timeLeft%60;
            timerDiv.innerHTML = `⏰ ${t('cartReserve')} ${mins}:${secs<10?'0'+secs:secs}`;
            timeLeft--;
        }, 1000);
    }
    
    // الطلب والفاتورة
    function openCheckoutModal() {
        if(!currentUser) { showToast(t('loginRequired'), true); openAuthModal(); return; }
        if(!cart.length) { showToast('السلة فارغة', true); return; }
        document.getElementById('fullName').value = currentUser.name||'';
        document.getElementById('email').value = currentUser.email||'';
        document.getElementById('phone').value = currentUser.phone||'';
        document.getElementById('address').value = currentUser.address||'';
        updateOrderSummary();
        document.getElementById('checkoutModal').style.display = 'flex';
    }
    function updateOrderSummary() {
        const country = document.getElementById('country').value;
        const sub = cart.reduce((s,i)=>s+i.price*i.quantity,0);
        const disc = sub * (couponDiscount/100);
        const ship = country === 'saudi' ? shippingSettings.domestic : shippingSettings.international;
        document.getElementById('orderSummary').innerHTML = `<div><strong>المنتجات:</strong></div>${cart.map(i=>`<div>${i.name} × ${i.quantity}</div>`).join('')}<hr><div>${t('total')}: ${formatPrice(convertPrice(sub))}</div>${couponDiscount>0?`<div>${t('discount')}: -${formatPrice(convertPrice(disc))}</div>`:''}<div>${t('shipping')}: ${formatPrice(convertPrice(ship))}</div><div style="font-size:1.2rem;">${t('total')}: ${formatPrice(convertPrice(sub-disc+ship))}</div>`;
    }
    async function submitOrder() {
        const name = document.getElementById('fullName').value.trim(), phone = document.getElementById('phone').value.trim(), address = document.getElementById('address').value.trim(), country = document.getElementById('country').value;
        if(!name || !phone || !address) { showToast(t('fillAllFields'), true); return; }
        const sub = cart.reduce((s,i)=>s+i.price*i.quantity,0);
        const disc = sub * (couponDiscount/100);
        const ship = country === 'saudi' ? shippingSettings.domestic : shippingSettings.international;
        const order = { customer:name, email:document.getElementById('email').value, phone, address, country, items:cart.map(i=>({id:i.id,name:i.name,quantity:i.quantity,price:i.price})), subtotal:sub, discount:couponDiscount, discountAmount:disc, shipping:ship, total:sub-disc+ship, currency:currentCurrency };
        const res = await fetch('/api/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(order) });
        const data = await res.json();
        if(data.success) {
            generateInvoice(order); playOrder(); showToast(t('orderPlaced'));
            cart = []; couponDiscount = 0; saveCart(); updateCartUI(); closeCheckoutModal(); loadProducts();
        } else showToast(t('orderError'), true);
    }
    function generateInvoice(o) {
        const win = window.open();
        win.document.write(`<html dir="rtl"><head><title>فاتورة الرعدي</title><style>body{font-family:Arial;padding:30px;max-width:800px;margin:auto;direction:rtl;}</style></head><body><div style="text-align:center;border-bottom:2px solid #e67e22;"><h1>🦅 الرعدي أونلاين</h1><p>فاتورة شراء</p></div><p><strong>التاريخ:</strong> ${new Date().toLocaleDateString()}</p><p><strong>العميل:</strong> ${o.customer}</p><p><strong>الهاتف:</strong> ${o.phone}</p><p><strong>العنوان:</strong> ${o.address}</p><p><strong>نوع الشحن:</strong> ${o.country==='saudi'?'شحن داخلي':'شحن دولي'}</p><table border="1" width="100%"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>${o.items.map(i=>`<tr><td>${i.name}</td><td>${i.quantity}</td><td>${formatPrice(convertPrice(i.price))}</td><td>${formatPrice(convertPrice(i.price*i.quantity))}</td></tr>`).join('')}</tbody></table><div><strong>المجموع الفرعي:</strong> ${formatPrice(convertPrice(o.subtotal))}</div>${o.discount>0?`<div><strong>الخصم:</strong> -${formatPrice(convertPrice(o.discountAmount))}</div>`:''}<div><strong>الشحن:</strong> ${formatPrice(convertPrice(o.shipping))}</div><div style="font-size:1.3rem;"><strong>الإجمالي النهائي:</strong> ${formatPrice(convertPrice(o.total))}</div><button onclick="window.print()">🖨️ طباعة</button></body></html>`);
    }
    function closeCheckoutModal() { document.getElementById('checkoutModal').style.display = 'none'; }
    
    // التقييمات
    function openRatingModal(id) { if(!currentUser) { showToast(t('loginRequired'), true); openAuthModal(); return; } currentRatingProduct = id; selectedRating = 0; document.querySelectorAll('#ratingStars i').forEach(s=>s.classList.remove('active')); document.getElementById('ratingModal').style.display = 'flex'; }
    function closeRatingModal() { document.getElementById('ratingModal').style.display = 'none'; }
    document.querySelectorAll('#ratingStars i').forEach(star => star.addEventListener('click', () => { selectedRating = parseInt(star.dataset.rate); document.querySelectorAll('#ratingStars i').forEach(s => parseInt(s.dataset.rate) <= selectedRating ? s.classList.add('active') : s.classList.remove('active')); }));
    async function submitRating() { if(selectedRating===0) { showToast('اختر تقييماً', true); return; } await fetch(`/api/products/${currentRatingProduct}/rate`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ rating:selectedRating, review_ar:document.getElementById('ratingReview').value }) }); showToast('شكراً لتقييمك'); closeRatingModal(); loadProducts(); }
    
    // الأمنيات
    async function toggleWishlist(id) {
        if(!currentUser) { showToast(t('loginRequired'), true); openAuthModal(); return; }
        const exists = wishlist.some(w=>w.id===id);
        if(exists) { await fetch('/api/wishlist/remove', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ productId:id }) }); showToast('تمت الإزالة'); }
        else { await fetch('/api/wishlist/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ productId:id }) }); showToast('تمت الإضافة'); }
        await loadWishlist();
    }
    async function openWishlistModal() {
        if(!currentUser) { showToast(t('loginRequired'), true); openAuthModal(); return; }
        const container = document.getElementById('wishlistItems');
        if(!wishlist.length) container.innerHTML = '<div style="text-align:center;padding:30px;">لا توجد منتجات</div>';
        else container.innerHTML = wishlist.map(w => `<div class="wishlist-item"><div><strong>${w.name}</strong><br>${formatPrice(convertPrice(w.price))}</div><button onclick="addToCart(${w.id}); closeWishlistModal()">${t('addToCart')}</button></div>`).join('');
        document.getElementById('wishlistModal').style.display = 'flex';
    }
    function closeWishlistModal() { document.getElementById('wishlistModal').style.display = 'none'; }
    
    // الدردشة
    async function loadMessages() { if(!currentUser) return; const res = await fetch('/api/messages'); const msgs = await res.json(); document.getElementById('chatMessages').innerHTML = msgs.map(m => `<div class="chat-message ${m.isAdmin?'admin':'user'}"><strong>${m.sender}:</strong> ${m.text_ar||m.text_en}<div style="font-size:0.7rem;">${m.timestamp}</div></div>`).join(''); }
    async function sendMessage() { const inp = document.getElementById('chatInput'); const text = inp.value.trim(); if(!text) return; await fetch('/api/messages', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ text_ar:text, text_en:text, isAdmin:false }) }); inp.value = ''; loadMessages(); playMessage(); showToast('تم الإرسال'); }
    function toggleChat() {
        const win = document.getElementById('chatWindow');
        win.classList.toggle('open');
        if(win.classList.contains('open')) {
            if(!currentUser) { showToast(t('loginRequired'), true); win.classList.remove('open'); openAuthModal(); return; }
            loadMessages(); if(chatInterval) clearInterval(chatInterval); chatInterval = setInterval(loadMessages, 5000);
        } else { if(chatInterval) clearInterval(chatInterval); }
    }
    
    // المصادقة
    function openAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
    function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }
    async function login() {
        const email = document.getElementById('loginEmail').value, pass = document.getElementById('loginPassword').value;
        if(!email||!pass) { document.getElementById('loginError').innerText = t('fillAllFields'); return; }
        const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email, password:pass }) });
        const data = await res.json();
        if(data.success) { currentUser = data.user; localStorage.setItem('raadi_user', JSON.stringify(currentUser)); closeAuthModal(); updateAuthUI(); loadProducts(); loadWishlist(); showToast(`${t('welcome')}, ${currentUser.name}`); playWelcome(); }
        else document.getElementById('loginError').innerText = data.error || t('invalidCredentials');
    }
    async function register() {
        const data = { name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPassword').value, phone: document.getElementById('regPhone').value, address: document.getElementById('regAddress').value };
        if(!data.name||!data.email||!data.password) { document.getElementById('registerError').innerText = t('fillAllFields'); return; }
        const res = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
        const result = await res.json();
        if(result.success) { showToast(t('registrationSuccess')); showLogin(); }
        else document.getElementById('registerError').innerText = result.error || t('emailExists');
    }
    async function logout() { await fetch('/api/logout', { method:'POST' }); currentUser = null; localStorage.removeItem('raadi_user'); updateAuthUI(); showToast('تم تسجيل الخروج'); loadProducts(); if(chatInterval) clearInterval(chatInterval); }
    function updateAuthUI() {
        document.getElementById('loginBtn').style.display = currentUser ? 'none' : 'block';
        document.getElementById('logoutBtn').style.display = currentUser ? 'block' : 'none';
        document.getElementById('adminBtn').style.display = (currentUser && currentUser.role === 'admin') ? 'block' : 'none';
    }
    function showRegister() { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; }
    function showLogin() { document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; }
    
    // العداد التنازلي
    function updateFlashSaleTimer() {
        const diff = flashSaleEnd - Date.now();
        if(diff <= 0) { document.getElementById('flashSaleTimer').style.display = 'none'; clearInterval(flashSaleInterval); return; }
        const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById('flashSaleTimer').innerHTML = `${t('flashSale')} ${m} ${m===1?t('minute'):t('minutes')} ${s} ${t('seconds')}`;
        document.getElementById('flashSaleTimer').style.display = 'block';
    }
    function startFlashSaleTimer() { updateFlashSaleTimer(); flashSaleInterval = setInterval(updateFlashSaleTimer, 1000); }
    
    // التهيئة
    document.getElementById('langSelect').addEventListener('change', (e) => { currentLang = e.target.value; localStorage.setItem('lang', currentLang); loadProducts(); loadCategories(); loadBanners(); loadAnnouncement(); });
    document.getElementById('currencySelect').addEventListener('change', (e) => { currentCurrency = e.target.value; localStorage.setItem('currency', currentCurrency); renderProducts(); updateCartUI(); });
    document.getElementById('searchInput').addEventListener('input', () => renderProducts());
    if(localStorage.getItem('raadi_dark') === 'true') toggleDarkMode();
    initSounds();
    loadSettings(); loadBanners(); loadAnnouncement(); loadCart();
    const savedUser = localStorage.getItem('raadi_user');
    if(savedUser) { try { fetch('/api/me').then(r=>r.json()).then(u=>{ if(u) { currentUser = u; updateAuthUI(); loadWishlist(); } }).catch(()=>{}); } catch(e){} }
    loadProducts(); loadCategories(); startFlashSaleTimer();
</script>
</body>
