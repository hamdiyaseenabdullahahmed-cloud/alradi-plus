<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>السلة — الرعدي بلاس</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="brand">
      <img src="/assets/logo.png" alt="logo" class="logo-img" />
      <div>
        <h1>الرعدي بلاس</h1>
        <p class="tag">سلة المشتريات</p>
      </div>
    </div>
    <div class="header-actions">
      <button onclick="location.href='/'" class="btn secondary">الرئيسية</button>
    </div>
  </header>

  <!-- Cart Section -->
  <main class="container">
    <section class="section">
      <h3>عناصر السلة</h3>
      <div id="cartItems"></div>
      <div style="margin-top:12px;display:flex;gap:10px">
        <button class="btn primary" onclick="placeOrder()">إتمام الطلب</button>
        <button class="btn secondary" onclick="clearCart()">تفريغ السلة</button>
      </div>
    </section>

    <!-- Customer Info -->
    <section class="section">
      <h3>بيانات العميل</h3>
      <form id="customerForm">
        <input type="text" name="name" placeholder="الاسم" required />
        <input type="email" name="email" placeholder="البريد الإلكتروني" required />
        <textarea name="address" placeholder="العنوان" required></textarea>
        <button type="submit" class="btn primary">تأكيد البيانات</button>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">© 2026 الرعدي أونلاين - جميع الحقوق محفوظة</footer>

  <!-- Script -->
  <script>
    let cart = JSON.parse(localStorage.getItem('cart_v1') || '[]');
    let customer = {};

    function renderCart(){
      const div = document.getElementById('cartItems');
      div.innerHTML = '';
      if(!cart.length){
        div.innerHTML = '<p>السلة فارغة</p>';
        return;
      }
      cart.forEach(c=>{
        const el = document.createElement('div');
        el.textContent = `منتج رقم ${c.id} × ${c.qty}`;
        div.appendChild(el);
      });
    }

    function clearCart(){
      cart = [];
      localStorage.setItem('cart_v1','[]');
      renderCart();
      alert('تم تفريغ السلة');
    }

    document.getElementById('customerForm').addEventListener('submit', e=>{
      e.preventDefault();
      const formData = new FormData(e.target);
      customer = {
        name: formData.get('name'),
        email: formData.get('email'),
        address: formData.get('address')
      };
      alert('تم حفظ بيانات العميل');
    });

    async function placeOrder(){
      if(!cart.length){ alert('السلة فارغة'); return; }
      if(!customer.name){ alert('أدخل بيانات العميل أولاً'); return; }
      try{
        const res = await fetch('/api/orders',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+localStorage.getItem('token')},
          body: JSON.stringify({ items: cart, address: customer.address })
        });
        const data = await res.json();
        if(data.ok){
          alert('تم إنشاء الطلب رقم '+data.orderId);
          // يمكن هنا استدعاء /api/invoice/:orderId لتحميل الفاتورة
        }else{
          alert('فشل إنشاء الطلب');
        }
      }catch(e){
        console.error(e);
        alert('خطأ في الاتصال بالخادم');
      }
    }

    renderCart();
  </script>
</body>
</html>
