<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ الرعدي أونلاين - المتجر الأسطوري</title>
    <meta name="description" content="متجر الرعدي أونلاين - تجربة تسوق فاخرة تنافس أمازون وعلي بابا">
    <meta name="theme-color" content="#C9A84C">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        :root {
            --primary: #C9A84C;
            --primary-dark: #A68A3E;
            --primary-light: #E6C975;
            --secondary: #1A1A2E;
            --bg-dark: #0F0F1A;
            --bg-card: #1A1A2E;
            --bg-card-hover: #222240;
            --text-light: #FFFFFF;
            --text-muted: #A0A0B0;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            --border: #2A2A3E;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.4);
            --radius-sm: 8px;
            --radius: 16px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.7;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }

        /* شاشة التحميل */
        #loadingScreen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark); display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s, visibility 0.5s;
        }
        #loadingScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-container { text-align: center; }
        .loader-logo { font-size: 60px; animation: pulse 1.5s infinite; }
        .loader-spinner {
            width: 50px; height: 50px; border: 3px solid var(--border);
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }

        /* شريط الترحيب */
        #welcomeToast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--secondary); padding: 15px 30px; border-radius: 50px;
            font-weight: bold; z-index: 1000; box-shadow: var(--shadow-lg);
            animation: slideDown 0.5s ease, slideUp 0.5s ease 3s forwards;
            display: none; white-space: nowrap;
        }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-100px); opacity: 0; } }
        @keyframes slideUp { to { transform: translateX(-50%) translateY(-100px); opacity: 0; } }

        /* إشعار التوست */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); color: var(--text-light); padding: 15px 25px;
            border-radius: 50px; border: 1px solid var(--border); z-index: 2000;
            box-shadow: var(--shadow); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
            display: none; white-space: nowrap; max-width: 90vw; text-align: center;
        }
        @keyframes toastIn { from { transform: translateX(-50%) translateY(100px); opacity: 0; } }
        @keyframes toastOut { to { transform: translateX(-50%) translateY(100px); opacity: 0; } }

        /* الهيدر */
        header {
            background: rgba(15,15,26,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 12px 0;
            position: sticky; top: 0; z-index: 100; transition: var(--transition);
        }
        header.scrolled { box-shadow: var(--shadow); }
        .header-inner {
            max-width: 1400px; margin: 0 auto; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between; gap: 15px;
        }
        .logo {
            font-size: 26px; font-weight: 900; color: var(--primary);
            text-decoration: none; display: flex; align-items: center; gap: 8px;
            transition: var(--transition); white-space: nowrap;
        }
        .logo:hover { color: var(--primary-light); transform: scale(1.05); }
        .logo-icon { font-size: 32px; animation: pulse 2s infinite; }
        .search-bar { flex: 1; max-width: 500px; position: relative; }
        .search-bar input {
            width: 100%; padding: 12px 50px 12px 20px;
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 50px; color: var(--text-light); font-size: 15px;
            transition: var(--transition);
        }
        .search-bar input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 25px rgba(201,168,76,0.2);
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: var(--primary); font-size: 18px; pointer-events: none;
        }
        .search-results {
            position: absolute; top: calc(100% + 5px); left: 0; right: 0;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            max-height: 350px; overflow-y: auto; display: none; z-index: 50; box-shadow: var(--shadow-lg);
        }
        .search-results.active { display: block; }
        .search-result-item {
            padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            transition: var(--transition); border-bottom: 1px solid var(--border);
        }
        .search-result-item:hover { background: rgba(201,168,76,0.1); }
        .search-result-item img { width: 45px; height: 45px; border-radius: var(--radius-sm); object-fit: cover; }
        .header-actions { display: flex; align-items: center; gap: 18px; }
        .header-btn {
            background: none; border: none; color: var(--text-light); font-size: 22px;
            cursor: pointer; position: relative; transition: var(--transition); padding: 5px;
        }
        .header-btn:hover { color: var(--primary); transform: scale(1.1); }
        .cart-count {
            position: absolute; top: -5px; right: -8px;
            background: var(--primary); color: var(--secondary); font-size: 10px;
            width: 18px; height: 18px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
        }

        /* المحتوى الرئيسي */
        main { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* السلايدر */
        .hero-slider {
            position: relative; border-radius: var(--radius-lg); overflow: hidden;
            margin-bottom: 30px; height: 450px;
        }
        .hero-slide {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; padding: 60px;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .hero-slide.active { opacity: 1; }
        .hero-slide:nth-child(1) { background: linear-gradient(135deg, #1A1A2E 0%, #2D1B3E 50%, #1A0A2E 100%); }
        .hero-slide:nth-child(2) { background: linear-gradient(135deg, #0F1A2E 0%, #1B2D3E 50%, #0A1A2E 100%); }
        .hero-slide:nth-child(3) { background: linear-gradient(135deg, #2E1A0F 0%, #3E2D1B 50%, #2E0A0F 100%); }
        .hero-content { max-width: 600px; }
        .hero-badge {
            display: inline-block; background: var(--primary); color: var(--secondary);
            padding: 8px 20px; border-radius: 50px; font-size: 14px; font-weight: bold;
            margin-bottom: 15px;
        }
        .hero-content h2 { font-size: 42px; color: var(--primary); margin-bottom: 15px; line-height: 1.2; }
        .hero-content p { font-size: 18px; color: var(--text-muted); margin-bottom: 25px; }
        .hero-content .btn {
            display: inline-block; padding: 14px 35px; background: var(--primary);
            color: var(--secondary); border-radius: 50px; text-decoration: none;
            font-weight: bold; font-size: 16px; transition: var(--transition);
        }
        .hero-content .btn:hover { background: var(--primary-light); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(201,168,76,0.3); }
        .slider-dots {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px;
        }
        .slider-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: rgba(255,255,255,0.3); cursor: pointer; transition: var(--transition);
        }
        .slider-dot.active { background: var(--primary); transform: scale(1.3); }

        /* الأقسام الدوارة */
        .categories-scroll {
            display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; scroll-behavior: smooth;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .category-item {
            flex: 0 0 auto; background: var(--bg-card); border-radius: var(--radius);
            padding: 20px 25px; text-align: center; cursor: pointer; transition: var(--transition);
            border: 1px solid transparent; min-width: 100px;
        }
        .category-item:hover { border-color: var(--primary); transform: translateY(-5px); }
        .category-item.active { border-color: var(--primary); background: rgba(201,168,76,0.1); }
        .category-icon { font-size: 32px; margin-bottom: 8px; }
        .category-name { font-size: 13px; color: var(--text-light); }

        /* شبكة المنتجات */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card {
            background: var(--bg-card); border-radius: var(--radius); overflow: hidden;
            transition: var(--transition); cursor: pointer; border: 1px solid transparent;
            position: relative; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
        .product-image { position: relative; aspect-ratio: 1; overflow: hidden; background: #0A0A15; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-image img { transform: scale(1.08); }
        .product-badge { position: absolute; top: 10px; right: 10px; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; z-index: 2; }
        .badge-sale { background: var(--danger); color: white; }
        .badge-new { background: var(--success); color: white; }
        .badge-low { background: var(--warning); color: var(--secondary); }
        .product-actions { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; gap: 8px; opacity: 0; transition: var(--transition); }
        .product-card:hover .product-actions { opacity: 1; }
        .product-action-btn {
            flex: 1; height: 35px; border-radius: var(--radius-sm);
            background: rgba(0,0,0,0.75); border: none; color: white; cursor: pointer;
            font-size: 13px; transition: var(--transition); display: flex; align-items: center; justify-content: center;
        }
        .product-action-btn:hover { background: var(--primary); color: var(--secondary); }
        .product-info { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 14px; margin-bottom: 8px; color: var(--text-light); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .current-price { font-size: 18px; font-weight: bold; color: var(--primary); }
        .old-price { font-size: 13px; color: var(--text-muted); text-decoration: line-through; }
        .product-rating { color: #F1C40F; font-size: 12px; margin-bottom: 5px; }
        .btn-add-cart { margin-top: auto; width: 100%; padding: 10px; border-radius: 8px; background: var(--primary); color: var(--secondary); border: none; font-weight: bold; cursor: pointer; transition: var(--transition); }
        .btn-add-cart:hover { background: var(--primary-light); }

        /* المودال */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border-radius: var(--radius-lg); padding: 30px;
            max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto;
            position: relative; border: 1px solid var(--border); box-shadow: var(--shadow-lg);
        }
        .modal-close { position: absolute; top: 15px; left: 15px; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
        .btn { display: inline-block; padding: 12px 28px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: var(--transition); text-align: center; }
        .btn-primary { background: var(--primary); color: var(--secondary); border: none; }
        .btn-block { display: block; width: 100%; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--text-muted); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text-light); }

        /* الأصوات */
        audio { display: none; }

        @media (max-width: 768px) {
            .header-inner { flex-wrap: wrap; }
            .search-bar { order: 3; flex: 100%; }
            .hero-slider { height: 250px; }
            .hero-content h2 { font-size: 22px; }
        }
    </style>
</head>
<body>
<!-- شاشة التحميل -->
<div id="loadingScreen"><div class="loader-container"><div class="loader-logo">⚡</div><div class="loader-spinner"></div><p style="color:var(--text-muted);">جاري تحميل المتجر...</p></div></div>
<div id="welcomeToast">⚡ مرحباً بك في الرعدي أونلاين</div>
<div id="toast"></div>

<!-- عناصر الصوت -->
<audio id="sound-add-to-cart" src="data:audio/mpeg;base64,..."></audio>
<audio id="sound-remove" src="data:audio/mpeg;base64,..."></audio>
<audio id="sound-success" src="data:audio/mpeg;base64,..."></audio>
<audio id="sound-error" src="data:audio/mpeg;base64,..."></audio>
<audio id="sound-welcome" src="data:audio/mpeg;base64,..."></audio>
<audio id="sound-logout" src="data:audio/mpeg;base64,..."></audio>
<audio id="sound-print" src="data:audio/mpeg;base64,..."></audio>

<!-- الهيدر -->
<header id="header">
    <div class="header-inner">
        <a href="/" class="logo"><span class="logo-icon">⚡</span> الرعدي أونلاين</a>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 ابحث..." oninput="handleSearch()">
            <div class="search-results" id="searchResults"></div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleLang()">🌐</button>
            <button class="header-btn" onclick="toggleCurrency()">💱</button>
            <button class="header-btn" onclick="openCart()">🛒<span class="cart-count" id="cartCount">0</span></button>
            <button class="header-btn" id="userBtn" onclick="handleUser()">👤</button>
        </div>
    </div>
</header>

<!-- المحتوى -->
<main>
    <div class="hero-slider" id="heroSlider">
        <div class="hero-slide active"><div class="hero-content"><span class="hero-badge">🔥 الأكثر مبيعاً</span><h2>أحدث الإلكترونيات</h2><p>خصومات تصل إلى 70%</p><a href="#products" class="btn">اكتشف العروض</a></div></div>
        <div class="hero-slide"><div class="hero-content"><span class="hero-badge">👗 وصول جديد</span><h2>تشكيلة الأزياء</h2><a href="#products" class="btn">تسوق الآن</a></div></div>
        <div class="hero-slide"><div class="hero-content"><span class="hero-badge">🧴 حصري</span><h2>عطور شرقية</h2><a href="#products" class="btn">استكشف</a></div></div>
        <div class="slider-dots" id="sliderDots"></div>
    </div>

    <!-- فئات دوارة -->
    <div class="categories-scroll" id="categoryList"></div>

    <h2>🏷️ المنتجات</h2>
    <div class="products-grid" id="productsGrid"></div>
    <button id="loadMore" class="btn btn-primary" style="display:none;margin:20px auto;" onclick="loadMore()">تحميل المزيد</button>
</main>

<!-- المودالات -->
<div class="modal-overlay" id="authModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('authModal')">✕</button>
        <h2 id="authTitle">تسجيل الدخول</h2>
        <div id="loginForm">
            <div class="form-group"><label>البريد</label><input type="email" id="loginEmail"></div>
            <div class="form-group"><label>كلمة المرور</label><input type="password" id="loginPassword"></div>
            <button class="btn btn-primary btn-block" onclick="login()">دخول</button>
            <p style="margin-top:10px;"><a href="#" onclick="showRegister()">إنشاء حساب</a></p>
        </div>
        <div id="registerForm" style="display:none;">
            <div class="form-group"><label>الاسم</label><input type="text" id="regName"></div>
            <div class="form-group"><label>البريد</label><input type="email" id="regEmail"></div>
            <div class="form-group"><label>الهاتف</label><input type="tel" id="regPhone"></div>
            <div class="form-group"><label>كلمة المرور</label><input type="password" id="regPassword"></div>
            <button class="btn btn-primary btn-block" onclick="register()">تسجيل</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="cartModal">
    <div class="modal" style="max-width:700px;">
        <button class="modal-close" onclick="closeModal('cartModal')">✕</button>
        <h2>🛒 سلة التسوق</h2>
        <div id="cartItems"></div>
        <div id="cartSummary" style="margin:20px 0; padding:15px; background:var(--bg-dark); border-radius:8px;"></div>
        <button class="btn btn-primary btn-block" onclick="checkout()">💳 إتمام الشراء</button>
    </div>
</div>

<div class="modal-overlay" id="invoiceModal">
    <div class="modal" style="max-width:800px; background:white; color:#000;">
        <button class="modal-close" onclick="closeModal('invoiceModal')">✕</button>
        <div id="invoiceContent"></div>
        <button class="btn btn-primary" onclick="playSound('sound-print'); window.print();">🖨️ طباعة</button>
    </div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('token');
let user = JSON.parse(localStorage.getItem('user') || 'null');
let cart = JSON.parse(localStorage.getItem('cart') || '[]');
let currentCategory = 'all', currentPage = 1;

function playSound(id) { const el = document.getElementById(id); if(el) { el.currentTime=0; el.play().catch(()=>{}); } }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// تحميل الأقسام
async function loadCategories() {
    const res = await fetch(`${API}/categories`);
    const data = await res.json();
    const container = document.getElementById('categoryList');
    container.innerHTML = `<div class="category-item active" onclick="filterCategory('all')">الكل</div>`;
    data.data.forEach(c => { container.innerHTML += `<div class="category-item" onclick="filterCategory('${c.name}')"><div class="category-icon">${c.icon}</div><div class="category-name">${c.name}</div></div>`; });
}

async function loadProducts(page=1, append=false) {
    let url = `${API}/products?page=${page}&limit=12`;
    if(currentCategory!=='all') url += `&category=${encodeURIComponent(currentCategory)}`;
    if(document.getElementById('searchInput').value) url += `&search=${encodeURIComponent(document.getElementById('searchInput').value)}`;
    const res = await fetch(url); const data = await res.json();
    const grid = document.getElementById('productsGrid');
    if(!append) grid.innerHTML = '';
    data.data.forEach(p => {
        const card = document.createElement('div'); card.className = 'product-card';
        card.innerHTML = `
            <div class="product-image">
                <img src="${p.images?.[0]?.url || 'https://placehold.co/400'}" alt="${p.name}">
                ${p.discount>0?`<span class="product-badge badge-sale">-${p.discount}%</span>`:''}
                ${p.stock===0?'<span class="product-badge badge-sale">نفذ</span>':''}
            </div>
            <div class="product-info">
                <div class="product-name">${p.name}</div>
                <div class="product-rating">${'⭐'.repeat(Math.round(p.ratings?.average||0))} (${p.ratings?.count||0})</div>
                <div class="product-price"><span class="current-price">${p.price} ر.س</span>${p.comparePrice?`<span class="old-price">${p.comparePrice} ر.س</span>`:''}</div>
                <button class="btn-add-cart" onclick="event.stopPropagation();addToCart('${p._id}')">أضف للسلة</button>
            </div>`;
        card.addEventListener('click', ()=>openProduct(p._id));
        grid.appendChild(card);
    });
    document.getElementById('loadMore').style.display = data.pagination.total > page*12 ? 'block' : 'none';
    currentPage = page;
    document.getElementById('loadingScreen').classList.add('hidden');
}

function loadMore() { loadProducts(currentPage+1, true); }
function filterCategory(cat) { currentCategory=cat; document.querySelectorAll('.category-item').forEach(el=>el.classList.remove('active')); event.target.classList.add('active'); loadProducts(1); }
function handleSearch() { loadProducts(1); }

function addToCart(productId) {
    playSound('sound-add-to-cart');
    const exist = cart.find(i=>i.productId===productId);
    if(exist) exist.quantity++; else cart.push({productId,quantity:1});
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    showToast('✅ تمت الإضافة');
}
function updateCartCount() { document.getElementById('cartCount').textContent = cart.reduce((s,i)=>s+i.quantity,0); }
function openCart() {
    const items = document.getElementById('cartItems');
    items.innerHTML = cart.map((i,idx)=>`<div style="display:flex;justify-content:space-between;margin:10px 0;">${i.name||'منتج'} (${i.quantity}) <button onclick="removeFromCart(${idx})">✕</button></div>`).join('');
    updateCartSummary();
    document.getElementById('cartModal').classList.add('active');
}
function removeFromCart(idx) { playSound('sound-remove'); cart.splice(idx,1); localStorage.setItem('cart',JSON.stringify(cart)); updateCartCount(); openCart(); }
function updateCartSummary() {
    const subtotal = cart.reduce((s,i)=>s+((i.price||0)*i.quantity),0);
    document.getElementById('cartSummary').innerHTML = `<p>الإجمالي: ${subtotal.toFixed(2)} ر.س</p>`;
}

async function checkout() {
    if(!token) return alert('سجل الدخول');
    const res = await fetch(`${API}/checkout`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({items:cart, shippingAddress:'الرياض'}) });
    const data = await res.json();
    if(data.success) { playSound('sound-success'); showInvoice(data.data); cart=[]; localStorage.setItem('cart','[]'); updateCartCount(); closeModal('cartModal'); }
    else alert(data.error);
}

function showInvoice(order) {
    document.getElementById('invoiceContent').innerHTML = `<h2>فاتورة ${order.orderNumber}</h2><p>الإجمالي: ${order.total} ر.س</p>`;
    document.getElementById('invoiceModal').classList.add('active');
}

function handleUser() {
    if(user) { if(confirm('تسجيل خروج؟')) { playSound('sound-logout'); token=null; user=null; localStorage.clear(); updateUserUI(); } }
    else document.getElementById('authModal').classList.add('active');
}
function updateUserUI() { document.getElementById('userBtn').textContent = user ? '👤✅' : '👤'; }

async function login() {
    const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value;
    const res = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
    const data = await res.json();
    if(data.success) { token=data.token; user=data.user; localStorage.setItem('token',token); localStorage.setItem('user',JSON.stringify(user)); closeModal('authModal'); playSound('sound-welcome'); updateUserUI(); }
    else alert(data.error);
}
async function register() {
    const body = { fullName: document.getElementById('regName').value, email: document.getElementById('regEmail').value, phone: document.getElementById('regPhone').value, password: document.getElementById('regPassword').value };
    const res = await fetch(`${API}/auth/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if(data.success) { token=data.token; user=data.user; localStorage.setItem('token',token); closeModal('authModal'); playSound('sound-welcome'); }
    else alert(data.error);
}

// تهيئة
loadCategories();
loadProducts(1);
updateCartCount();
updateUserUI();
setTimeout(()=>document.getElementById('loadingScreen').classList.add('hidden'), 3000);
</script>
