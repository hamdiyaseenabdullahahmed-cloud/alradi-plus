<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - الرعدي أونلاين</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', system-ui;
        }
        body {
            background: linear-gradient(135deg, #1a2a3a, #0f1724);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 48px;
            padding: 40px 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { color: #b87333; margin-bottom: 10px; }
        .logo { font-size: 3rem; margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 15px 20px;
            margin: 12px 0;
            border: 1px solid #ddd;
            border-radius: 60px;
            font-size: 1rem;
            text-align: right;
        }
        button {
            background: #b87333;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background: #8b5a2b; }
        .error {
            background: #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 30px;
            margin: 15px 0;
            font-size: 0.85rem;
            display: none;
        }
        .demo-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 24px;
            margin-top: 25px;
            font-size: 0.75rem;
            text-align: right;
        }
        hr { margin: 20px 0; border: none; border-top: 1px solid #eee; }
        .loading {
            display: none;
            margin: 10px 0;
            font-size: 0.8rem;
            color: #b87333;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🛍️</div>
        <h1>الرعدي أونلاين</h1>
        <p style="margin-bottom: 25px;">تسجيل الدخول إلى حسابك</p>
        
        <div id="errorMsg" class="error"></div>
        <div id="loadingMsg" class="loading">⏳ جاري التحقق...</div>
        
        <input type="email" id="email" placeholder="البريد الإلكتروني" value="admin@system.com">
        <input type="password" id="password" placeholder="كلمة المرور" value="admin123">
        
        <button onclick="login()">دخول</button>
        
        <hr>
        
        <div class="demo-box">
            <strong>📋 بيانات الدخول التجريبية:</strong><br>
            👑 <strong>مدير:</strong> admin@system.com / admin123<br>
            👤 <strong>عميل:</strong> ahmed@client.com / 123456
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            const loadingDiv = document.getElementById('loadingMsg');
            
            errorDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.innerHTML = '❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور';
                errorDiv.style.display = 'block';
                return;
            }
            
            loadingDiv.style.display = 'block';
            
            try {
                console.log('جاري الاتصال بـ /api/login...');
                
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                console.log('الرد:', response.status);
                const data = await response.json();
                console.log('البيانات:', data);
                
                loadingDiv.style.display = 'none';
                
                if (data.success && data.user) {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    
                    if (data.user.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    errorDiv.innerHTML = '❌ ' + (data.error || 'البريد الإلكتروني أو كلمة المرور غير صحيحة');
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                loadingDiv.style.display = 'none';
                errorDiv.innerHTML = '❌ خطأ في الاتصال: ' + err.message;
                errorDiv.style.display = 'block';
                console.error('خطأ:', err);
            }
        }
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        // اختبار الاتصال بـ API عند تحميل الصفحة
        async function testAPI() {
            try {
                const res = await fetch('/api/products');
                if (res.ok) {
                    console.log('✅ API يعمل');
                } else {
                    console.log('❌ API لا يعمل');
                }
            } catch(e) {
                console.log('❌ لا يمكن الاتصال بـ API');
            }
        }
        testAPI();
    </script>
</body>
</html>
